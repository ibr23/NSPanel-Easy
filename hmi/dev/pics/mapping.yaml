# mapping.yaml
#
# Defines the source images and Nextion HMI slot assignments for all
# generated picture files, for both landscape and portrait orientations.
#
# Schema per entry:
#
#   src:              Source file path relative to pics/ (applies to both
#                     orientations when set at the top level). Can be
#                     overridden per orientation when landscape and portrait
#                     require different source images (e.g. horizontal vs
#                     vertical slider bars).
#
#   dark:             Nextion HMI slot number for the dark-theme variant.
#   light:            Nextion HMI slot number for the light-theme variant.
#                     Set to null if the image has no light variant and the
#                     dark slot file should be reused as-is.
#
#   landscape:        Compositing parameters for the landscape orientation.
#     src:            Optional orientation-specific source override.
#     coordinates:    Top-left corner where the source is placed on the
#                     background canvas, as "X,Y".
#     dimensions:     Size of the region to crop out, as "WxH".
#                     The script derives the ImageMagick -geometry and
#                     -crop arguments from these two fields.
#
#   portrait:         Compositing parameters for the portrait orientation.
#     src:            Optional orientation-specific source override.
#     coordinates:    Top-left corner where the source is placed on the
#                     background canvas, as "X,Y".
#     dimensions:     Size of the region to crop out, as "WxH".
#
#   copy:             When true, the source file is copied directly with no
#                     compositing (black background assumed). No light variant
#                     is generated. Overrides geometry fields.
#
#   id:               Short unique snake_case identifier for this entry.
#                     Used as the opener field for human scannability and
#                     in script error messages.
#
#   note:             Optional human-readable annotation.
#
# Source files live under pics/ and should follow the naming convention:
#   <category>_<description>[_<variant>].png
# Subdirectories under pics/ are encouraged to group by category.
---
# -----------------------------------------------------------------------------
# Background
# -----------------------------------------------------------------------------
- id: background_dark
  note: "Base background canvas for dark-theme compositing. Imported to HMI slot 0."
  dark: 0
  light: null
  copy: true
  landscape:
    src: background/background_dark_landscape.png
  portrait:
    src: background/background_dark_portrait.png
- id: background_light
  note: "Base background canvas for light-theme compositing. Imported to HMI slot 48."
  dark: null
  light: 48
  copy: true
  landscape:
    src: background/background_light_landscape.png
  portrait:
    src: background/background_light_portrait.png
