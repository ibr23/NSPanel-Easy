#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME - Page boot                                                                       #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  PAGE_BOOT_COMPONENT_ID_BT_REBOOT: 20
  PAGE_BOOT_DELAY_TO_EXIT: 30s
  PAGE_BOOT_ID: 0
  TAG_PAGE_BOOT: nspanel.page.boot

display:
  - id: !extend disp1
    start_up_page: ${PAGE_BOOT_ID}
    on_touch:
      then:
        - lambda: |-
            if (
                  !touch_event and  // Only act with release
                  page_id == get_page_id("boot") and
                  component_id == ${PAGE_BOOT_COMPONENT_ID_BT_REBOOT}  // Reboot button
                ) {
              screen_power->turn_off();
              App.safe_reboot();
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_BOOT

script:
  - id: !extend boot_log
    then:
      - lambda: |-
          if (current_page_id != get_page_id("boot")) return;
          disp1->send_command_printf("log_body.txt+=\"%s: %s\\r\"", category.c_str(), log_message.c_str());

  - id: !extend boot_preparation
    then:
      - script.execute: page_boot_exit_on_timeout

  - id: !extend event_from_display  # Defined by hw_display
    then:
      - lambda: |-
          if ((params[0] == "blank" || params[0] == "boot") && params[1] == "params") {
            // Protocol versions:
            // CSV Format v0:      boot,params,<display_mode>,<charset>,<version>
            // CSV Format v1:      boot,params,<display_mode>,<version>
            // CSV Format v2(new): boot,params,<display_mode>,<hard_coded_mode>,<version>,<magic_flag_found_at_boot>
            // params[0] = "boot"
            // params[1] = "params"
            // params[2] = display_mode               // EEPROM-backed or hard_coded
            // params[3] = hard_coded_mode            // new: compile-time default for this TFT file
            //           = charset (ignored)          // old: no longer used
            // params[4] = version                    // both contracts
            // params[5] = magic_flag_found_at_boot   // new only: 0 = uninitialized, 1 = valid

            system_flags.display_settings_received = false;

            uint8_t protocol_version = UINT8_MAX;

            switch (params_count) {
              case 4:  // Contract v1
                protocol_version = 1;
                break;
              case 5:  // Contract v0 (Blackymas)
                protocol_version = 0;
                break;
              case 6:  // Contract v2 (new)
                protocol_version = 2;
                break;
            }

            if (protocol_version > 2) {
              ESP_LOGW("${TAG_PAGE_BOOT}", "Unexpected params count: %zu", params_count);
              return;
            }

            const bool old_contract = (params_count == 5);


            // Stop the timer which sends these params, as those are not going to change anymore
            disp1->send_command("tm_esphome.en=0");

            // Parse display parameters — pre-validate to reject whitespace, signs,
            // and non-numeric input before parsing, then range-check the result.
            auto parse_uint8_strict = [](const std::string &s) -> uint8_t {
              if (s.empty() || s.find_first_not_of("0123456789") != std::string::npos)
                return 0;
              char *end = nullptr;
              const unsigned long parsed = strtoul(s.c_str(), &end, 10);
              return (parsed <= UINT8_MAX) ? static_cast<uint8_t>(parsed) : 0;
            };

            const uint8_t display_mode_from_tft = parse_uint8_strict(params[2]);
            ESP_LOGI("${TAG_PAGE_BOOT}", "Display params:");
            ESP_LOGI("${TAG_PAGE_BOOT}", "  Contract ver:  %" PRIu8, protocol_version);
            ESP_LOGI("${TAG_PAGE_BOOT}", "  Mode:          %" PRIu8, display_mode_from_tft);

            switch (protocol_version) {
              case 0:  // Blackymas / pre-CJK removal: boot,params,<display_mode>,<charset>,<version>
                ESP_LOGW("${TAG_PAGE_BOOT}", "  Old TFT contract v0 — initializing EEPROM");
                if (display_mode_from_tft > 0 && display_mode_from_tft <= ${DISPLAY_MODES.EASY_US_LAND.ID}) {
                  display_mode_eeprom = display_mode_from_tft;
                  auto call = display_model->make_call();
                  call.set_index(display_mode_from_tft - 1);
                  call.perform();
                } else {
                  ESP_LOGW("${TAG_PAGE_BOOT}", "  Invalid display_mode: %" PRIu8, display_mode_from_tft);
                }
                break;
              case 1:  // v2026.4.9 only: boot,params,<display_mode>,<version>
                ESP_LOGW("${TAG_PAGE_BOOT}", "  Old TFT contract v1 — initializing EEPROM");
                if (display_mode_from_tft > 0 && display_mode_from_tft <= ${DISPLAY_MODES.EASY_US_LAND.ID}) {
                  display_mode_eeprom = display_mode_from_tft;
                  auto call = display_model->make_call();
                  call.set_index(display_mode_from_tft - 1);
                  call.perform();
                } else {
                  ESP_LOGW("${TAG_PAGE_BOOT}", "  Invalid display_mode: %" PRIu8, display_mode_from_tft);
                }
                break;
              case 2: {  // v2026.4.10+: boot,params,<display_mode>,<hard_coded_mode>,<version>,<magic_flag_found_at_boot>
                const uint8_t hard_coded_mode          = parse_uint8_strict(params[3]);
                const uint8_t magic_flag_found_at_boot = parse_uint8_strict(params[5]);
                ESP_LOGI("${TAG_PAGE_BOOT}", "  Hard-coded:    %" PRIu8, hard_coded_mode);
                ESP_LOGI("${TAG_PAGE_BOOT}", "  Magic flag:    %" PRIu8, magic_flag_found_at_boot);

                if (magic_flag_found_at_boot == 0) {
                  ESP_LOGW("${TAG_PAGE_BOOT}", "  EEPROM was uninitialized at boot — using hard-coded default");
                  if (hard_coded_mode > 0 && hard_coded_mode <= ${DISPLAY_MODES.EASY_US_LAND.ID}) {
                    auto call = display_model->make_call();
                    call.set_index(hard_coded_mode - 1);
                    call.perform();
                  } else {
                    ESP_LOGW("${TAG_PAGE_BOOT}", "  Invalid hard_coded_mode: %" PRIu8, hard_coded_mode);
                  }
                } else {
                  if (display_mode_from_tft > 0 && display_mode_from_tft <= ${DISPLAY_MODES.EASY_US_LAND.ID}) {
                    auto call = display_model->make_call();
                    call.set_index(display_mode_from_tft - 1);
                    call.perform();
                  } else {
                    ESP_LOGW("${TAG_PAGE_BOOT}", "  Invalid display_mode: %" PRIu8, display_mode_from_tft);
                  }
                }
                break;
              }
            }

            // Version position depends on contract
            const std::string &ver_str = (protocol_version == 1) ? params[3] : params[4];
            const size_t dot = ver_str.find('.');
            const bool tft_ver_valid =
                !ver_str.empty() &&
                ver_str.find_first_not_of("0123456789.") == std::string::npos &&  // digits and dot only
                (dot == std::string::npos ||                                      // bare integer, no dot
                (dot != 0 &&                                                      // dot not at start
                  dot != ver_str.size() - 1 &&                                    // dot not at end
                  ver_str.find('.', dot + 1) == std::string::npos));              // no second dot
            version_tft->publish_state(tft_ver_valid ? ver_str : "");

            ESP_LOGI("${TAG_PAGE_BOOT}", "  TFT version:   %s%s", ver_str.c_str(), tft_ver_valid ? "" : " (INVALID)");

            system_flags.display_settings_received = tft_ver_valid && display_valid;
          }

  - id: page_boot
    mode: single
    then:
      - lambda: |-
          ESP_LOGD("${TAG_PAGE_BOOT}", "Page boot constructor started");
          page_boot_exit_on_timeout->execute();
          disp1->set_component_text("ver_firmware", "Firmware: ${version}");  // ESPHome version
          #ifdef ARDUINO
          disp1->set_component_text("sys_framework", "Framework: Arduino");
          #elif defined(USE_ESP_IDF)
          disp1->set_component_text("sys_framework", "Framework: ESP-IDF");
          #else
          disp1->set_component_text("sys_framework", "Framework: Unknown");
          #endif
          page_boot_show_blueprint_version->execute();
          page_boot_show_ip->execute();
          wait_for_page_boot_exit->execute();
          ESP_LOGD("${TAG_PAGE_BOOT}", "Page boot constructor completed");

  - id: page_boot_exit_on_timeout
    mode: single
    then:
      - delay: ${PAGE_BOOT_DELAY_TO_EXIT}
      - script.wait: wait_for_version_tft
      - lambda: |-
          if (current_page_id == get_page_id("boot"))
            wakeup->execute(false);

  - id: page_boot_show_blueprint_version
    mode: single
    then:
      - lambda: |-
          if (current_page_id == get_page_id("boot") and !version_blueprint->state.empty())
            disp1->set_component_text_printf("ver_blueprint", "Blueprint: %s", version_blueprint->state.c_str());

  - id: page_boot_show_ip
    mode: single
    then:
      - lambda: |-
          if (!wifi_component->is_connected()) return;
          if (current_page_id != get_page_id("boot")) return;
          auto ips = network::get_ip_addresses();
          if (ips.empty()) return;
          char ip[16];  // sufficient for IPv4: "255.255.255.255" + '\0'
          ips[0].str_to(ip);
          disp1->set_component_text_printf("sys_ip", "IP: %s", ip);

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("boot") and !display_easy)
            page_boot->execute();

  - id: !extend stop_all
    then:
      - lambda: |-
          wait_for_page_boot_exit->stop();

  - id: !extend stop_page_constructors
    then:
      - lambda: |-
          page_boot->stop();
          page_boot_show_blueprint_version->stop();
          page_boot_show_ip->stop();

  - id: wait_for_page_boot_exit
    mode: restart
    then:
      - while:
          condition:
            - lambda: |-
                return current_page_id == get_page_id("boot");
          then:
            - lambda: |-
                ESP_LOGV("${TAG_PAGE_BOOT}", "Waiting for boot page exit");
            - delay: 1s

  - id: !extend watchdog_round
    then:
      - lambda: |-
          if (current_page_id != get_page_id("boot")) return;
          if (version_tft->state.empty()) return;
          wakeup->execute(true);

text_sensor:
  - id: !extend version_blueprint
    on_value:
      then:
        - lambda: |-
            page_boot_show_blueprint_version->execute();
            wait_to_be_ready->execute();

wifi:
  on_connect:
    then:
      - script.execute: page_boot_show_ip
...
