#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME - Page media_player                                                               #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  MEDIA_PLAYER_FEATURE_PAUSE: 1
  MEDIA_PLAYER_FEATURE_SEEK: 2
  MEDIA_PLAYER_FEATURE_VOLUME_SET: 4
  MEDIA_PLAYER_FEATURE_VOLUME_MUTE: 8
  MEDIA_PLAYER_FEATURE_PREVIOUS_TRACK: 16
  MEDIA_PLAYER_FEATURE_NEXT_TRACK: 32
  MEDIA_PLAYER_FEATURE_TURN_ON: 128
  MEDIA_PLAYER_FEATURE_TURN_OFF: 256
  MEDIA_PLAYER_FEATURE_PLAY_MEDIA: 512
  MEDIA_PLAYER_FEATURE_VOLUME_STEP: 1024
  MEDIA_PLAYER_FEATURE_SELECT_SOURCE: 2048
  MEDIA_PLAYER_FEATURE_STOP: 4096
  MEDIA_PLAYER_FEATURE_CLEAR_PLAYLIST: 8192
  MEDIA_PLAYER_FEATURE_PLAY: 16384
  MEDIA_PLAYER_FEATURE_SHUFFLE_SET: 32768
  MEDIA_PLAYER_FEATURE_SELECT_SOUND_MODE: 65536
  MEDIA_PLAYER_FEATURE_BROWSE_MEDIA: 131072
  MEDIA_PLAYER_FEATURE_REPEAT_SET: 262144
  MEDIA_PLAYER_FEATURE_GROUPING: 524288
  MEDIA_PLAYER_FEATURE_MEDIA_ANNOUNCE: 1048576
  MEDIA_PLAYER_FEATURE_MEDIA_ENQUEUE: 2097152
  TAG_PAGE_MEDIA_PLAYER: nspanel.page.media_player

api:
  actions:
    # Dynamically updates the media player page with current state and media information.
    - action: page_media_player
      variables:
        entity: string             # Entity ID of the media player, used for state updates and control.
        state: string              # Current playback state of the media player (e.g., "playing", "paused", "stopped").
        is_volume_muted: bool      # Indicates if the media volume is currently muted.
        volume_level: int          # Current volume level, typically expressed as a percentage.
        media_title: string        # Title of the currently playing media.
        media_artist: string       # Artist of the currently playing media.
        media_duration: int        # Total duration of the current media in seconds.
        media_position: int        # Current playback position in the media in seconds.
        media_position_delta: int  # Time elapsed since the last media position update in seconds.
        supported_features: int    # Bitmask indicating the media player's supported features (e.g., play, pause, volume control).
      then:
        - lambda: |-
            ESP_LOGD("${TAG_PAGE_MEDIA_PLAYER}",
                      "Action: page_media_player entity=%s state=%s muted=%s vol=%d "
                      "dur=%d pos=%d delta=%d features=%d",
                      entity.c_str(), state.c_str(), YESNO(is_volume_muted), volume_level,
                      media_duration, media_position, media_position_delta, supported_features);

            if (current_page_id != get_page_id("media_player")) {
              ESP_LOGW("${TAG_PAGE_MEDIA_PLAYER}", "Not on Media Player page");
              return;
            }

            // Publish the entity sensor once up front so touch-event handlers always
            // have the current entity, even when this call short-circuits below.
            detailed_entity->publish_state(entity.c_str());

            // Classify the entity state once. HA guarantees media_player states are
            // one of: "off", "on", "idle", "playing", "paused", "standby",
            // "buffering", "unavailable", "unknown".
            const bool state_unavailable = (state == "unavailable" || state == "unknown");
            const bool state_off = (state == "off");
            const bool state_playing = (state == "playing");

            // Bail out for dead entities. HA can transiently report these right after
            // startup, after an integration reload, or when a backing service dies.
            // Reasoning about features for such entities produces a hollowed-out UI,
            // so hide every actionable control, stop the progress timer, and return.
            if (state_unavailable) {
              ESP_LOGD("${TAG_PAGE_MEDIA_PLAYER}", "Entity %s is %s; hiding controls", entity.c_str(), state.c_str());
              disp1->set_component_visibility("bt_on_off", false);
              disp1->set_component_visibility("bt_play_pause", false);
              disp1->set_component_visibility("bt_prev", false);
              disp1->set_component_visibility("bt_next", false);
              disp1->set_component_visibility("bt_mute", false);
              disp1->set_component_visibility("vol_slider", false);
              disp1->set_component_visibility("vol_text", false);
              disp1->set_component_visibility("bt_vol_down", false);
              disp1->set_component_visibility("bt_vol_up", false);
              disp1->set_component_visibility("time_current", false);
              disp1->set_component_visibility("time_total", false);
              disp1->set_component_visibility("time_progress", false);
              disp1->send_command_printf("prg_timer.en=0");
              return;
            }

            // Feature flags, cached once for readability and to avoid repeated masking.
            const bool has_turn_on = (supported_features & ${MEDIA_PLAYER_FEATURE_TURN_ON}) != 0;
            const bool has_turn_off = (supported_features & ${MEDIA_PLAYER_FEATURE_TURN_OFF}) != 0;
            const bool has_play = (supported_features & ${MEDIA_PLAYER_FEATURE_PLAY}) != 0;
            const bool has_play_m = (supported_features & ${MEDIA_PLAYER_FEATURE_PLAY_MEDIA}) != 0;
            const bool has_pause = (supported_features & ${MEDIA_PLAYER_FEATURE_PAUSE}) != 0;
            const bool has_stop = (supported_features & ${MEDIA_PLAYER_FEATURE_STOP}) != 0;
            const bool has_prev = (supported_features & ${MEDIA_PLAYER_FEATURE_PREVIOUS_TRACK}) != 0;
            const bool has_next = (supported_features & ${MEDIA_PLAYER_FEATURE_NEXT_TRACK}) != 0;
            const bool has_mute = (supported_features & ${MEDIA_PLAYER_FEATURE_VOLUME_MUTE}) != 0;
            const bool has_vol_set = (supported_features & ${MEDIA_PLAYER_FEATURE_VOLUME_SET}) != 0;
            const bool has_vol_step = (supported_features & ${MEDIA_PLAYER_FEATURE_VOLUME_STEP}) != 0;

            // Media title and artist. Display-width limits differ by orientation;
            // wrapText handles per-locale byte widths for multi-byte scripts.
            disp1->set_component_text("track", wrapText(media_title.c_str(),
                                                        display_portrait ? 16 : 27,
                                                        ${LANG_BYTES_PER_CHAR}).c_str());
            disp1->set_component_text("artist", wrapText(media_artist.c_str(),
                                                          display_portrait ? 26 : 40,
                                                          ${LANG_BYTES_PER_CHAR}).c_str());

            // Button - ON/OFF. The HMI touch event fires "media_player,toggle", which
            // HA accepts for any entity exposing on/off/play/pause/stop. Show the
            // button whenever any of those features is supported; color reflects the
            // current on/off state. See upstream Blackymas/NSPanel_HA_Blueprint#2768
            // for the motivating report.
            const bool show_on_off = has_turn_on || has_turn_off || has_play || has_play_m || has_pause || has_stop;
            if (show_on_off) {
              disp1->set_component_foreground_color(
                  "bt_on_off", state_off ? ${COLOR_WHITE} : ${COLOR_BLUE_INDIGO});
            }
            disp1->set_component_visibility("bt_on_off", show_on_off);

            // Button - Play/Pause.
            // Show "play" when not currently playing and either PLAY or PLAY_MEDIA is
            // supported (standard resume/start path). Show "pause" when playing and
            // PAUSE is supported. When paused but only PAUSE is exposed (no PLAY), the
            // button would be non-functional for resume, so it is hidden to avoid a
            // dead control.
            const bool show_play = !state_playing && !state_off && (has_play || has_play_m);
            const bool show_pause = state_playing && has_pause;
            if (show_play) {
              disp1->set_component_text("bt_play_pause", Icons::MDI_PLAY);
            } else if (show_pause) {
              disp1->set_component_text("bt_play_pause", Icons::MDI_PAUSE);
            }
            disp1->set_component_visibility("bt_play_pause", show_play || show_pause);

            // Previous / Next track. Visible whenever the feature is supported and
            // the entity is not off (idle players legitimately allow pre-playlist
            // skipping).
            disp1->set_component_visibility("bt_prev", has_prev && !state_off);
            disp1->set_component_visibility("bt_next", has_next && !state_off);

            // Button - Mute/Unmute.
            if (has_mute) {
              disp1->set_component_text(
                  "bt_mute", is_volume_muted ? Icons::MDI_VOLUME_VARIANT_OFF : Icons::MDI_VOLUME_LOW);
              disp1->set_component_value("is_muted", is_volume_muted ? 1 : 0);
            }
            disp1->set_component_visibility("bt_mute", has_mute);

            // Volume set / step controls.
            if (has_vol_set && last_volume_level != volume_level) {
              last_volume_level = volume_level;
              disp1->set_component_text_printf("vol_text", "%d%%", volume_level);
              disp1->set_component_value("vol_slider", volume_level);
            }
            disp1->set_component_visibility("vol_slider", has_vol_set);
            disp1->set_component_visibility("vol_text", has_vol_set);
            disp1->set_component_visibility("bt_vol_down", has_vol_step);
            disp1->set_component_visibility("bt_vol_up", has_vol_step);

            // Media progress bar.
            // "media_duration > 0" is the cue that a finite track is loaded
            // (livestreams report 0). The bar is always visible as a layout
            // anchor; only its color and value change between active and
            // empty states. The flanking time text fields are hidden when
            // there is no duration since they have nothing to show.
            const bool has_duration = media_duration > 0;
            if (has_duration) {
              if (media_duration != last_media_duration || media_position != last_media_position) {
                last_media_duration = media_duration;
                last_media_position = media_position;
                const int capped_pos = std::min(media_position + media_position_delta, media_duration);
                disp1->set_component_value("prg_current", capped_pos);
                disp1->set_component_value("prg_total", media_duration);
              }
              // Active fill — explicit color, overrides design-time pco.
              disp1->set_component_foreground_color("time_progress", ${COLOR_BLUE_INDIGO});
            } else {
              // Empty bar: zero progress, theme-aware dim color, no animation.
              // Use the Nextion runtime variable color_pco_unsupported so
              // the bar follows the active theme without ESPHome having to
              // know which theme is current.
              disp1->set_component_value("prg_current", 0);
              disp1->send_command("time_progress.pco=color_pco_unsupported");
              last_media_duration = 0;
              last_media_position = 0;
            }
            disp1->send_command_printf("prg_timer.en=%i", (has_duration && state_playing) ? 1 : 0);
            disp1->set_component_visibility("time_current", has_duration);
            disp1->set_component_visibility("time_total", has_duration);
            disp1->set_component_visibility("time_progress", true);

            ESP_LOGV("${TAG_PAGE_MEDIA_PLAYER}", "Action: page_media_player completed");

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_MEDIA_PLAYER

script:
  - id: !extend event_from_display
    then:
      - lambda: |-
          if (params_count < 2) return;

          if (params[0] == "media_player") {
            // CSV Format:
            // media_player,volume_mute,<value>
            // media_player,volume_set,<value>
            // media_player,<action>

            ESP_LOGV("${TAG_PAGE_MEDIA_PLAYER}", "key=%s", params[1].c_str());

            if (params[1] == "volume_mute") {
              if (params_count != 3) {
                ESP_LOGW("${TAG_PAGE_MEDIA_PLAYER}", "Bad params");
                return;
              }

              ESP_LOGV("${TAG_PAGE_MEDIA_PLAYER}", "volume_mute=%s", params[2].c_str());

              fire_ha_event("action_call", {
                {"action", "media_player.volume_mute"},
                {"key", "is_volume_muted"},
                {"value", params[2].c_str()},
                {"entity", detailed_entity->state.c_str()}
              });

            } else if (params[1] == "volume_set") {
              if (params_count != 3) {
                ESP_LOGW("${TAG_PAGE_MEDIA_PLAYER}", "Bad params");
                return;
              }

              float value_float = atof(params[2].c_str()) / 100.0f;
              if (value_float < 0.0f) value_float = 0.0f;
              else if (value_float > 1.0f) value_float = 1.0f;
              ESP_LOGV("${TAG_PAGE_MEDIA_PLAYER}", "volume_level=%.2f", value_float);

              fire_ha_event("action_call", {
                {"action", "media_player.volume_set"},
                {"key", "volume_level"},
                {"value", to_string(value_float)},
                {"entity", detailed_entity->state.c_str()}
              });

            } else {
              // Generic media player action (play, pause, etc.)
              if (params_count != 2) {
                ESP_LOGW("${TAG_PAGE_MEDIA_PLAYER}", "Bad params");
                return;
              }

              ESP_LOGV("${TAG_PAGE_MEDIA_PLAYER}", "action=%s", params[1].c_str());

              fire_ha_event("action_call", {
                {"action", (std::string("media_player.") + params[1]).c_str()},
                {"entity", detailed_entity->state.c_str()}
              });
            }
          }

  - id: !extend page_change
    then:
      - lambda: if (new_page_id == get_page_id("media_player")) page_media_player->execute();

  - id: page_media_player
    mode: restart
    then:  # There's nothing here so far

  - id: !extend stop_all
    then:
      - lambda: page_media_player->stop();

  - id: !extend stop_page_constructors
    then:
      - lambda: page_media_player->stop();
...
