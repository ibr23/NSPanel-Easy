#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### TFT Upload engine                                                                         #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################
##### ATTENTION: This will add advanced elements to the core system and requires the core part. #####
#####################################################################################################
---
substitutions:
  ################## Defaults ##################
  nextion_update_base_url: "https://raw.githubusercontent.com/edwardtfn/NSPanel-Easy/v${version}/hmi"
  nextion_update_url: ""
  upload_tft_automatically: true
  upload_tft_baud_rate: ${BAUD_RATE}
  upload_tft_wait_ms_after_boot: 181000  # 181sec
  ##############################################
  TAG_UPLOAD_TFT: "nspanel.addon.upload_tft"
  DISPLAY_MODES_BLANK_TEXT: ${DISPLAY_MODES.BLANK.TEXT}
  include_action_upload_tft: false
  _pkg_action_upload_tft:  # To do: move this to an external package after v2024.6.0
    api:
      actions:
        ##### TFT File Update Service: `upload_tft`
        # Updates the panel's TFT file remotely from a specified URL or the default location, requiring the "Upload TFT" add-on.
        # Usage: Essential for applying custom TFT designs or updates, especially when direct repository access is unavailable.
        #
        # Parameters:
        # - `url` (string): URL for the TFT file. If "default" or empty, uses the URL from "Update TFT - Display Model" in Home Assistant settings.
        #
        # Example:
        # service: esphome.<your_panel_name>_upload_tft
        # data:
        #   url: "http://homeassistant.local:8123/local/custom_tft_file.tft"  # Custom or default URL to the TFT file
        #
        # [!NOTE]
        # Utilize "default" to automatically use the URL associated with the display model set in Home Assistant.
        #
        # [!ATTENTION]
        # Requires the "Upload TFT" add-on for functionality.
        - action: upload_tft
          variables:
            url: string
          then:
            - lambda: |-
                if (!system_flags.tft_upload_active) {
                  tft_upload_manual_request = true;
                  upload_tft->execute(url.c_str());
                }
  include_button_scan_baud_rate: false
  _pkg_button_scan_baud_rate:  # To do: move this to an external package after v2024.6.0
    # NSPanel Easy - Baud Rate Scanner (Diagnostic Add-on)
    #
    # Usage: Paste this into your local panel's YAML file.
    #
    # This add-on adds a button that:
    #   1. Power-cycles the Nextion display
    #   2. Scans all Nextion-supported baud rates for a response
    #   3. If found, switches the ESP UART to that rate and triggers TFT upload
    #
    # Scan order is optimized for NSPanel Easy common cases first.
    button:
      - id: baud_scan
        name: Scan baud rate
        platform: template
        icon: mdi:magnify
        entity_category: diagnostic
        on_press:
          - lambda: |-
              ESP_LOGI("${TAG_UPLOAD_TFT}", "Baud scan: starting");

          # Power-cycle the display to ensure a clean UART state
          - switch.turn_off: screen_power
          - delay: 2s
          - switch.turn_on: screen_power
          - delay: 2s

          - lambda: |-
              static const uint32_t BAUD_RATES[] = {
                  921600, 115200, 9600, 230400, 57600, 38400,
                  256000, 512000, 250000, 19200, 31250, 4800, 2400
              };
              static const size_t BAUD_RATE_COUNT = sizeof(BAUD_RATES) / sizeof(BAUD_RATES[0]);
              static const uint32_t PROBE_TIMEOUT_MS = 500;

              bool found = false;

              for (size_t i = 0; i < BAUD_RATE_COUNT && !found; ++i) {
                const uint32_t rate = BAUD_RATES[i];
                ESP_LOGI("${TAG_UPLOAD_TFT}", "Baud scan: trying %" PRIu32 " bps", rate);

                // Switch ESP UART to candidate rate
                tf_uart->set_baud_rate(rate);
                tf_uart->load_settings();

                // Flush any RX noise
                uint32_t flush_until = millis() + 100;
                while (millis() < flush_until) {
                  while (tf_uart->available()) {
                    uint8_t discard;
                    tf_uart->read_byte(&discard);
                  }
                  delay(1);
                  App.feed_wdt();
                }

                // Send probe
                disp1->send_command("get sleep");

                // Spin waiting for response
                const uint32_t probe_until = millis() + PROBE_TIMEOUT_MS;
                bool got_response = false;
                while (millis() < probe_until) {
                  if (tf_uart->available() > 0) {
                    got_response = true;
                    break;
                  }
                  delay(1);
                  App.feed_wdt();
                }

                // Flush probe response
                while (tf_uart->available()) {
                  uint8_t discard;
                  tf_uart->read_byte(&discard);
                }

                if (got_response) {
                  ESP_LOGI("${TAG_UPLOAD_TFT}", "Baud scan: found active rate %" PRIu32 " bps", rate);
                  found = true;
                  // baud_rate_active text sensor updated after lambda
                } else {
                  ESP_LOGD("${TAG_UPLOAD_TFT}", "Baud scan: no response at %" PRIu32 " bps", rate);
                  // Revert to a safe rate before next attempt
                  tf_uart->set_baud_rate(${BAUD_RATE_FALLBACK});
                  tf_uart->load_settings();
                  delay(50);
                  App.feed_wdt();
                }
              }

              if (!found) {
                ESP_LOGE("${TAG_UPLOAD_TFT}", "Baud scan: no response at any rate");
                // Restore compiled primary rate so the system is not left stranded
                tf_uart->set_baud_rate(${BAUD_RATE});
                tf_uart->load_settings();
              }
              // Persist scan outcome — used by the gate below
              system_flags.baud_scan_success = found;

              // Update baud rate sensor to reflect current UART state
              baud_rate_active->update();
              if (system_flags.baud_scan_success) {
                ESP_LOGI("${TAG_UPLOAD_TFT}", "Baud scan: triggering TFT upload");
                system_flags.baud_fallback_active = (tf_uart->get_baud_rate() != ${BAUD_RATE});
                tft_update->press();
              }

packages:
  action_upload_tft: ${ _pkg_action_upload_tft if include_action_upload_tft else {} }
  button_scan_baud_rate: ${ _pkg_button_scan_baud_rate if include_button_scan_baud_rate else {} }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_ADDON_UPLOAD_TFT
      - -D NSPANEL_EASY_ADDON_UPLOAD_TFT_AUTOMATICALLY=${1 if upload_tft_automatically else 0}

button:
  ##### UPDATE TFT DISPLAY #####
  - id: tft_update
    name: Update TFT display
    platform: template
    icon: mdi:file-sync
    entity_category: config
    on_press:
      then:
        - lambda: |-
            tft_upload_manual_request = true;
            upload_tft->execute("");

display:
  - id: !extend disp1
    exit_reparse_on_start: true
    tft_url: "http://unused"  # This is an intentional placeholder URL and will be replaced dynamically

globals:
  - id: first_time_synced_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

script:
  - id: !extend check_versions
    then:
      - lambda: |-
          // Automatic upload is enabled
          #if NSPANEL_EASY_ADDON_UPLOAD_TFT_AUTOMATICALLY
            // Return if the current TFT already meets the minimum required version
            if (tft_ver_gte(version_tft->state, "${min_tft_version}")) {
              ESP_LOGV("${TAG_UPLOAD_TFT}", "Supported version");
              return;
            }

            // Only proceed when a standard TFT is selected (indices 1+)
            if (!display_valid || display_model->current_option() == "${DISPLAY_MODES_BLANK_TEXT}") {
              ESP_LOGD("${TAG_UPLOAD_TFT}", "No hardware TFT selected");
              return;
            }

            ESP_LOGI("${TAG_UPLOAD_TFT}", "Auto updating TFT from '%s' to '${min_tft_version}'", version_tft->state.c_str());
            upload_tft->execute("");
          #else  // Automatic upload is disabled
            ESP_LOGV("${TAG_UPLOAD_TFT}", "Auto updating is disabled");
            return;
          #endif  // NSPANEL_EASY_ADDON_UPLOAD_TFT_AUTOMATICALLY

  - id: !extend dump_config
    then:
      - lambda: |-
          if (system_flags.tft_upload_active)
            ESP_LOGW("${TAG_UPLOAD_TFT}", "TFT upload in progress");
          ESP_LOGCONFIG("${TAG_UPLOAD_TFT}", "Add-on Upload TFT:");
          ESP_LOGCONFIG("${TAG_UPLOAD_TFT}", "  File model: %s", display_model->current_option());
          ESP_LOGCONFIG("${TAG_UPLOAD_TFT}", "  Valid TFT:  %s", YESNO(display_valid));

  - id: nextion_status
    mode: restart
    then:
      - lambda: |-
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Nextion status:");
          ESP_LOGD("${TAG_UPLOAD_TFT}", "  Is detected: %s", YESNO(disp1->is_detected()));
          ESP_LOGD("${TAG_UPLOAD_TFT}", "  Is setup:    %s", YESNO(disp1->is_setup()));
          ESP_LOGD("${TAG_UPLOAD_TFT}", "  Queue size:  %d", disp1->queue_size());

  - id: nextion_upload
    mode: single
    then:
      - lambda: |-
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Waiting for empty UART and Nextion queues");
      - wait_until:
          condition:
            - lambda: return (disp1->queue_size() < 1) and (tf_uart->available() < 1);
          timeout: 10s
      - delay: 2s
      - lambda: |-
          const uint32_t upload_baud = system_flags.baud_fallback_active
              ? static_cast<uint32_t>(${BAUD_RATE_FALLBACK})
              : tf_uart->get_baud_rate();
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Starting TFT upload at %" PRIu32 " bps", upload_baud);
          tft_upload_result = disp1->upload_tft(upload_baud, !disp1->is_setup());

  - id: !extend stop_all
    then:
      - lambda: |-
          nextion_status->stop();

  - id: upload_tft
    mode: single
    parameters:
      url: string
    then:
      - lambda: |-
          ESP_LOGI("${TAG_UPLOAD_TFT}", "Upload TFT sequence started");
      - while:
          condition:
            - lambda: return not tft_upload_manual_request;
            - lambda: return (uint32_t)(millis() - tft_upload_first_time_synced_ms) < ${upload_tft_wait_ms_after_boot};
          then:
            - lambda: |-
                const uint32_t elapsed = (uint32_t)(millis() - tft_upload_first_time_synced_ms);
                const uint32_t target = ${upload_tft_wait_ms_after_boot};
                if (elapsed < target)
                  ESP_LOGD("${TAG_UPLOAD_TFT}", "TFT upload will start in %u sec", (target - elapsed) / 1000u);
            - delay: 15s

      # Make sure the screen is ON
      - if:
          condition:
            - switch.is_off: screen_power
          then:
            - switch.turn_on: screen_power
            - delay: 5s
      - lambda: |-
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Set Nextion unavailable for blueprint calls");
          nextion_init->publish_state(false);

          ESP_LOGD("${TAG_UPLOAD_TFT}", "Preparing for upload");

          nextion_status->execute();
          system_flags.tft_upload_active = true;
          if (current_page_id == get_page_id("boot")) {
            disp1->send_command("tm_esphome.en=0");  // Stop updates from boot page
          }
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Open upload dialog");
          disp1->set_component_text("confirm.page_name", "tft_upload");
          disp1->set_component_text("confirm.title", "NSPanel Easy");
          disp1->set_component_text("confirm.body", "TFT Upload");
          goto_page->execute(get_page_id("confirm"));
          disp1->hide_component("bclose");
          disp1->hide_component("bt_accept");
          disp1->hide_component("bt_clear");

          ESP_LOGD("${TAG_UPLOAD_TFT}", "Starting the upload script");
          ESP_LOGV("${TAG_UPLOAD_TFT}", "  Baud rate: %" PRIu32, tf_uart->get_baud_rate());

          // Calculate URL
          std::string resolved_url;

          // nextion_update_url substitution takes absolute priority
          static const char* const NEXTION_UPDATE_URL = "${nextion_update_url}";
          if (NEXTION_UPDATE_URL[0] != '\0') {
            resolved_url = NEXTION_UPDATE_URL;
          } else if (!url.empty() && url != "default") {
            // URL explicitly provided to this script
            resolved_url = url;
          } else {
            // Build URL from selected model
            static const char* const FILENAMES[] = {
              "${DISPLAY_MODES.EU.FILE}",            // 0: NSPanel EU
              "${DISPLAY_MODES.US.FILE}",            // 1: NSPanel US
              "${DISPLAY_MODES.US_LAND.FILE}",       // 2: NSPanel US Landscape
              "${DISPLAY_MODES.BLANK.FILE}",         // 3: NSPanel Blank
              "${DISPLAY_MODES.EASY_EU.FILE}",       // 4: NSPanel Easy EU
              "${DISPLAY_MODES.EASY_US.FILE}",       // 5: NSPanel Easy US
              "${DISPLAY_MODES.EASY_US_LAND.FILE}",  // 6: NSPanel Easy US Landscape
            };
            static const size_t FILENAMES_COUNT = sizeof(FILENAMES) / sizeof(FILENAMES[0]);

            const auto idx_opt = display_model->active_index();
            const size_t idx = idx_opt.value_or(UINT8_MAX);

            if (idx < FILENAMES_COUNT) {
              resolved_url = std::string("${nextion_update_base_url}/nspanel_") + FILENAMES[idx] + ".tft";
            } else {
              ESP_LOGE("${TAG_UPLOAD_TFT}", "TFT upload aborted: No valid display model selected");
              upload_tft->stop();
              return;
            }
          }

          ESP_LOGV("${TAG_UPLOAD_TFT}", "  Upload URL: %s", resolved_url.c_str());
          disp1->set_tft_url(resolved_url.c_str());

      - delay: 2s
      - lambda: |-
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Stopping other scripts");
          stop_all->execute();
      - script.wait: stop_all
      - wait_until:
          condition:
            - lambda: return !display_valid;
          timeout: 1s

      # Stop Bluetooth stack if present
      - lambda: |-
          // Stop Bluetooth stack to free memory for TFT upload
          #ifdef USE_ESP32_BLE
          ESP_LOGI("${TAG_UPLOAD_TFT}", "Stopping Bluetooth stack to free memory for TFT upload");
          ESP_LOGI("${TAG_UPLOAD_TFT}", "Free heap before: %u bytes, largest block: %u bytes",
                                        esp_get_free_heap_size(), heap_caps_get_largest_free_block(MALLOC_CAP_8BIT));

          // Hide Bluetooth icon on page "home"
          disp1->send_command("vis_bt_icon=0");
          if (current_page_id == get_page_id("home")) disp1->hide_component(hmi::home::BT_ICON.name);

          // Disable BLE stack
          if (esp32_ble::global_ble != nullptr) {
            ESP_LOGI("${TAG_UPLOAD_TFT}", "Disabling BLE stack");
            esp32_ble::global_ble->disable();
          }
          #endif  // USE_ESP32_BLE
      - wait_until:
          condition:
            - lambda: |-
                // Wait up to 5s to the stack being disabled
                #ifdef USE_ESP32_BLE
                return (esp32_ble::global_ble == nullptr || !esp32_ble::global_ble->is_active());
                #else
                return true;
                #endif  // USE_ESP32_BLE
          timeout: 5s
      - lambda: |-
          // Release BT memory back to the heap — not done by disable().
          // Required to reclaim RAM for the TFT upload.
          #ifdef USE_BLUETOOTH_PROXY
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Releasing Bluetooth memory (BTDM)");
          esp_err_t err = esp_bt_controller_mem_release(ESP_BT_MODE_BTDM);
          if (err == ESP_OK) {
            ESP_LOGI("${TAG_UPLOAD_TFT}", "Bluetooth memory released successfully");
          } else {
            ESP_LOGW("${TAG_UPLOAD_TFT}", "Bluetooth memory release failed: %s", esp_err_to_name(err));
          }
          #endif  // USE_BLUETOOTH_PROXY
          #ifdef USE_ESP32_BLE
          ESP_LOGI("${TAG_UPLOAD_TFT}", "Free heap after: %u bytes, largest block: %u bytes",
                                        esp_get_free_heap_size(), heap_caps_get_largest_free_block(MALLOC_CAP_8BIT));
          #endif  // USE_ESP32_BLE

      ### Attempt twice
      - script.execute: upload_tft_sequence_attempt
      - script.wait: upload_tft_sequence_attempt

      ### Restart Nextion and attempt twice again
      - lambda: |-
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Restarting Nextion display");
          screen_power->turn_off();
      - delay: 2s
      - switch.turn_on: screen_power
      - delay: 5s
      - script.execute: upload_tft_sequence_attempt
      - script.wait: upload_tft_sequence_attempt

      ### All tries failed ###
      - lambda: |-
          ESP_LOGE("${TAG_UPLOAD_TFT}", "TFT upload failed");
          ESP_LOGD("${TAG_UPLOAD_TFT}", "Turn off Nextion and restart ESPHome");
          screen_power->turn_off();

          // Restart ESPHome
          App.safe_reboot();

  - id: upload_tft_sequence_attempt
    mode: single
    then:
      - lambda: |-
          nextion_status->execute();
      - repeat:
          count: 2
          then:
            # First attempt
            - script.execute: upload_tft_attempt
            - script.wait: upload_tft_attempt
            - delay: 5s

  - id: upload_tft_attempt
    mode: single
    then:
      - logger.log: "Attempting to upload TFT"
      - lambda: tft_upload_attempt++;
      - lambda: |-
          char update_msg[128];
          sprintf(update_msg, "Attempt #%d", tft_upload_attempt);
          tft_upload_result = false;
          ESP_LOGD("${TAG_UPLOAD_TFT}", update_msg);
      - delay: 1s
      - script.execute: nextion_upload
      - script.wait: nextion_upload
      - lambda: |-
          char update_msg[128];
          sprintf(update_msg, "Attempt #%d returned: %s", tft_upload_attempt,
                                                          tft_upload_result ? "Success!" : "FAILED");
          ESP_LOGD("${TAG_UPLOAD_TFT}", update_msg);
          ESP_LOGI("addon_upload_tft.script.upload_tft_attempt", "Restarting ESPHome");
          App.safe_reboot();

select:
  - id: !extend display_model
    options:
      - ${DISPLAY_MODES.BLANK.TEXT}
      - ${DISPLAY_MODES.EASY_EU.TEXT}

time:
  - id: !extend time_provider
    on_time_sync:
      then:
        - lambda: |-
            if (tft_upload_first_time_synced_ms > 0) return;  // First time sync already registered
            tft_upload_first_time_synced_ms = millis();
...
