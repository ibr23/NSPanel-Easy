#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - PAGE - QRCODE                                                              #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  qrcode_initial_value: ''
  qrcode_title_initial_value: ''
  qrcode_icon_color_initial_value: 'Colors::GRAY_LIGHT'
  qrcode_restore_value: false
  qrcode_background_color: 65535
  qrcode_foreground_color: 0
  qrcode_border_size: 8
  qrcode_max_length: 105  # Must match the setting on Nextion
  TAG_PAGE_QRCODE: nspanel.page.qrcode

api:
  actions:
    # Dynamically displays QR codes on the ESPHome UI for sharing information such as WiFi passwords or website links.
    - action: qrcode
      variables:
        title: string   # Heading or title for the QR code, offering context or instructions.
        qrcode: string  # Data or URL to be encoded into the QR code.
        show: bool      # Flag to immediately display the QR code page upon service invocation.
      then:
        - lambda: |-
            ESP_LOGV("${TAG_PAGE_QRCODE}", "Action: qrcode");
            ESP_LOGV("${TAG_PAGE_QRCODE}", "  title: %s", title.c_str());
            ESP_LOGV("${TAG_PAGE_QRCODE}", "  qrcode: %s", qrcode.c_str());
            ESP_LOGV("${TAG_PAGE_QRCODE}", "  show: %s", YESNO(show));

            // Update blueprint status
            blueprint_status_flags.page_qrcode = true;

            // Validate QRcode length
            if (qrcode.length() > ${qrcode_max_length}) {
              ESP_LOGE("${TAG_PAGE_QRCODE}", "QR code exceeds Nextion limit: %zu chars (max ${qrcode_max_length})", qrcode.length());
              return;
            }  // qrcode.length() > ${qrcode_max_length}

            if (!show and title == id(qrcode_title) and qrcode == id(qrcode_string)) {
              ESP_LOGV("${TAG_PAGE_QRCODE}", "QR code unchanged");
              return;
            }

            const uint8_t qrcode_page_id = get_page_id("qrcode");
            const uint8_t home_page_id = get_page_id("home");
            bool data_changed = false;

            if (qrcode.empty() and !id(qrcode_string).empty()) {
              ESP_LOGD("${TAG_PAGE_QRCODE}", "QR code empty");
              id(qrcode_string) = qrcode;
              disp1->send_command("vis_bt_qrcode=0");
              if (current_page_id == home_page_id) {
                disp1->hide_component(hmi::home::BT_QRCODE.name);
                return;
              }
              if (current_page_id == qrcode_page_id) {
                goto_page->execute(home_page_id);
              }
              return;
            }  // qrcode.empty() and !id(qrcode_string).empty()

            if (id(qrcode_title) != title) {
              id(qrcode_title) = title;
              data_changed = true;
            }
            if (id(qrcode_string) != qrcode) {
              id(qrcode_string) = qrcode;
              data_changed = true;
            }

            if (data_changed and current_page_id == qrcode_page_id) {
              page_qrcode->execute();
              return;  // Already on QR code page; navigation not needed
            }

            if (show) {
              goto_page->execute(qrcode_page_id);
            }

display:
  - id: !extend disp1
    on_touch:
      then:
        - lambda: |-
            if (touch_event) return;  // Ignore the touch, so only the release will be used
            if (page_id == hmi::home::PAGE.id and          // Page `home`
                component_id == get_page_id("qrcode") and  // QRcode button
                !id(qrcode_string).empty()) {              // QRcode string is not empty
              goto_page->execute(get_page_id("qrcode"));
              return;
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_QRCODE

globals:
  - id: qrcode_icon
    type: std::string
    restore_value: ${qrcode_restore_value}
    initial_value: 'Icons::WIFI_DISCONNECTED'

  - id: qrcode_icon_color
    type: uint16_t
    restore_value: ${qrcode_restore_value}
    initial_value: '${qrcode_icon_color_initial_value}'

  - id: qrcode_string
    type: std::string
    restore_value: ${qrcode_restore_value}
    initial_value: '${qrcode_initial_value}'

  - id: qrcode_title
    type: std::string
    restore_value: ${qrcode_restore_value}
    initial_value: '${qrcode_title_initial_value}'

script:
  - id: !extend action_component_color
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component == "qrcode_icon_color" and id(qrcode_icon_color) != color) {
            id(qrcode_icon_color) = color;
            page_home_icon_visibility->execute(hmi::home::BT_QRCODE.name,
                                                id(qrcode_icon_color),
                                                (not id(qrcode_string).empty()));
            blueprint_status_flags.page_qrcode = true;
            return;
          }

  - id: !extend action_component_text
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component == "qrcode_icon" and txt != id(qrcode_icon)) {
            id(qrcode_icon) = txt.c_str();
            disp1->set_component_text(hmi::home::BT_QRCODE.name, txt.c_str());
            blueprint_status_flags.page_qrcode = true;
            return;
          }

  - id: !extend boot
    then:
      - lambda: |-
          disp1->set_component_font(hmi::home::BT_QRCODE.name, id(home_custom_buttons_font_id));

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("qrcode"))
            page_qrcode->execute();

  - id: page_qrcode
    mode: single
    then:
      - lambda: |-
          if (current_page_id != get_page_id("qrcode")) return;  // Page QRcode not visible
          if (id(qrcode_string).empty()) {
            goto_page->execute(get_page_id("home"));
            return;
          }
          // Draw QRcode
          disp1->set_component_text(hmi::qrcode::QR.name, id(qrcode_string).c_str());
          #if ${qrcode_background_color} != 65535
          disp1->set_component_background_color(hmi::qrcode::QR.name, ${qrcode_background_color});
          #endif  // qrcode_background_color
          #if ${qrcode_foreground_color} > 0
          disp1->set_component_foreground_color(hmi::qrcode::QR.name, ${qrcode_foreground_color});
          #endif  // qrcode_foreground_color
          #if ${qrcode_border_size} != 8
          disp1->send_command("qr.dis=${qrcode_border_size}");
          #endif  // qrcode_border_size

          if (not id(qrcode_title).empty()) {
            disp1->set_component_text(hmi::qrcode::PAGE_LABEL.name, id(qrcode_title).c_str());
          }

          if (not id(qrcode_icon).empty()) {
            disp1->set_component_text(hmi::qrcode::ICON_STATE.name, id(qrcode_icon).c_str());
          }


  - id: !extend stop_page_constructors
    then:
      - lambda: page_qrcode->stop();
...
