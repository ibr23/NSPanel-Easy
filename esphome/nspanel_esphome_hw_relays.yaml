#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - HARDWARE - RELAYS                                                          #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  GPIO_RELAY_1_PIN: 22
  GPIO_RELAY_2_PIN: 19
  TAG_HW_RELAYS: nspanel.hw.relays

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_HW_RELAYS

globals:
  ##### Relay icons #####
  - id: home_relay1_icon
    type: std::string
    restore_value: true
    max_restore_data_length: 16
    initial_value: ''
  - id: home_relay1_icon_color
    type: uint16_t
    restore_value: true
    initial_value: '65535'
  - id: home_relay2_icon
    type: std::string
    restore_value: true
    max_restore_data_length: 16
    initial_value: ''
  - id: home_relay2_icon_color
    type: uint16_t
    restore_value: true
    initial_value: '65535'

script:
  - id: !extend action_component_color
    then:
      - lambda: |-
          if (page == "mem") {
            if (component == "relay1_icon_color") {
              id(home_relay1_icon_color) = color;
              chip_states[CHIP_IDX_RELAY1].color = color;
              if (is_chips_page) {
                disp1->set_component_font_color(CHIP_NAMES[CHIP_IDX_RELAY1], color);
              }
            } else if (component == "relay2_icon_color") {
              id(home_relay2_icon_color) = color;
              chip_states[CHIP_IDX_RELAY2].color = color;
              if (is_chips_page) {
                disp1->set_component_font_color(CHIP_NAMES[CHIP_IDX_RELAY2], color);
              }
            }
          }

  - id: !extend action_component_text
    then:
      - lambda: |-
          if (page == "mem") {
            if (component == "relay1_icon" && id(home_relay1_icon) != txt) {
              id(home_relay1_icon) = txt;
              strncpy(chip_states[CHIP_IDX_RELAY1].icon, txt.c_str(), sizeof(chip_states[CHIP_IDX_RELAY1].icon) - 1);
              chip_states[CHIP_IDX_RELAY1].icon[sizeof(chip_states[CHIP_IDX_RELAY1].icon) - 1] = '\0';
              if (is_chips_page) {
                disp1->set_component_text(CHIP_NAMES[CHIP_IDX_RELAY1], chip_states[CHIP_IDX_RELAY1].icon);
              }
            } else if (component == "relay2_icon" && id(home_relay2_icon) != txt) {
              id(home_relay2_icon) = txt;
              strncpy(chip_states[CHIP_IDX_RELAY2].icon, txt.c_str(), sizeof(chip_states[CHIP_IDX_RELAY2].icon) - 1);
              chip_states[CHIP_IDX_RELAY2].icon[sizeof(chip_states[CHIP_IDX_RELAY2].icon) - 1] = '\0';
              if (is_chips_page) {
                disp1->set_component_text(CHIP_NAMES[CHIP_IDX_RELAY2], chip_states[CHIP_IDX_RELAY2].icon);
              }
            }
          }

  - id: !extend action_component_val
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component != "relay_settings") return;

          // Extract individual relay settings from the calculated uint8_t value
          // Bit layout from YAML calculation: bits 0,1,4,5 used
          const uint8_t relay_settings = static_cast<uint8_t>(val);
          id(hardware_settings).relay1_local = (relay_settings >> 0) & 1;
          id(hardware_settings).relay1_fallback = (relay_settings >> 1) & 1;
          id(hardware_settings).relay2_local = (relay_settings >> 4) & 1;
          id(hardware_settings).relay2_fallback = (relay_settings >> 5) & 1;

  - id: !extend boot_early_routines
    then:
      - lambda: |-
          // Seed chip_states for relay slots from persisted globals so render_chip
          // can display the correct icon before the blueprint reconnects.
          strncpy(chip_states[CHIP_IDX_RELAY1].icon, id(home_relay1_icon).c_str(),
                  sizeof(chip_states[CHIP_IDX_RELAY1].icon) - 1);
          chip_states[CHIP_IDX_RELAY1].icon[sizeof(chip_states[CHIP_IDX_RELAY1].icon) - 1] = '\0';
          chip_states[CHIP_IDX_RELAY1].color = id(home_relay1_icon_color);
          chip_states[CHIP_IDX_RELAY1].visible = relay_1->state;

          strncpy(chip_states[CHIP_IDX_RELAY2].icon, id(home_relay2_icon).c_str(),
                  sizeof(chip_states[CHIP_IDX_RELAY2].icon) - 1);
          chip_states[CHIP_IDX_RELAY2].icon[sizeof(chip_states[CHIP_IDX_RELAY2].icon) - 1] = '\0';
          chip_states[CHIP_IDX_RELAY2].color = id(home_relay2_icon_color);
          chip_states[CHIP_IDX_RELAY2].visible = relay_2->state;

  - id: !extend button_left_press_short
    then:
      - lambda: |-
          if (id(hardware_settings).relay1_local) {
            relay_1->toggle();
            return;
          }
          if (id(hardware_settings).relay1_fallback and
              (!api_server->is_connected_with_state_subscription() or !wifi_component->is_connected())) {
            relay_1->toggle();
            return;
          }

  - id: !extend button_right_press_short
    then:
      - lambda: |-
          if (id(hardware_settings).relay2_local) {
            relay_2->toggle();
            return;
          }
          if (id(hardware_settings).relay2_fallback and
              (!api_server->is_connected_with_state_subscription() or !wifi_component->is_connected())) {
            relay_2->toggle();
            return;
          }

  - id: !extend new_minute
    then:
      - script.execute:
          id: refresh_relays
          relay_mask: 3

  - id: !extend page_home
    then:
      - script.execute:
          id: refresh_relays
          relay_mask: 3

  - id: refresh_relays
    mode: single
    parameters:
      relay_mask: uint8_t
    then:
      - lambda: |-
          if (system_flags.tft_upload_active) return;  // Skip refresh if TFT update is in progress
          ESP_LOGV("${TAG_HW_RELAYS}", "Script: refresh_relays");
          if (relay_mask & 1) {  // Chip - Relay 1
            ESP_LOGV("${TAG_HW_RELAYS}", "  relay1_local:    %s", YESNO(id(hardware_settings).relay1_local));
            ESP_LOGV("${TAG_HW_RELAYS}", "  relay1_fallback: %s", YESNO(id(hardware_settings).relay1_fallback));
            if (chip_states[CHIP_IDX_RELAY1].visible != relay_1->state) {
              chip_states[CHIP_IDX_RELAY1].visible = relay_1->state;
              if (is_chips_page)
                disp1->set_component_visibility(CHIP_NAMES[CHIP_IDX_RELAY1], chip_states[CHIP_IDX_RELAY1].visible);
            }
          }
          if (relay_mask & 2) {  // Chip - Relay 2
            ESP_LOGV("${TAG_HW_RELAYS}", "  relay2_local:    %s", YESNO(id(hardware_settings).relay2_local));
            ESP_LOGV("${TAG_HW_RELAYS}", "  relay2_fallback: %s", YESNO(id(hardware_settings).relay2_fallback));
            if (chip_states[CHIP_IDX_RELAY2].visible != relay_2->state) {
              chip_states[CHIP_IDX_RELAY2].visible = relay_2->state;
              if (is_chips_page)
                disp1->set_component_visibility(CHIP_NAMES[CHIP_IDX_RELAY2], chip_states[CHIP_IDX_RELAY2].visible);
            }
          }

  - id: !extend stop_all
    then:
      - lambda: refresh_relays->stop();

switch:
  - id: relay_1  # Physical switch 1
    name: Relay 1
    platform: gpio
    pin: ${GPIO_RELAY_1_PIN}
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            if (id(hardware_settings).relay1_local) id(hardware_settings).button_left_state = x;
            refresh_relays->execute(1);
            refresh_hardware_buttons_bars->execute(1);

  - id: relay_2  # Physical switch 2
    name: Relay 2
    platform: gpio
    pin: ${GPIO_RELAY_2_PIN}
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            if (id(hardware_settings).relay2_local) id(hardware_settings).button_right_state = x;
            refresh_relays->execute(2);
            refresh_hardware_buttons_bars->execute(2);
...
