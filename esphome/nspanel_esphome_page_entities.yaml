#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - Page Entities                                                              #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  half_width_chars: "iljtIf '-,;:!.\\\"|()[]{}*^~\\\\/_"
  TAG_PAGE_ENTITIES: nspanel.page.entities

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_ENTITIES

script:
  - id: !extend action_component_color
    then:
      - lambda: |-
          if (page == "mem") {
            if (component == "entities_pages_icon_color") {  // Entities pages button
              disp1->set_component_font_color(hmi::home::BT_ENTITIES.name, color);
              return;
            }
          }

  - id: !extend action_component_text
    then:
      - lambda: |-
          if (page == "mem") {
            if (component == "entities_pages_icon") {  // Entities pages button icon
              disp1->set_component_text(hmi::home::BT_ENTITIES.name, txt.c_str());
            }
            return;
          }
          if (page.find("entitypage") != 0) return;
          if (
              not txt.empty() and  // There's nothing to adjust if the value is empty
              component.find("_") == std::string::npos  // Applies only to value itself. No label or icon.
              ) {
            // Value - Adjust decimal separator
            if (not id(mui_decimal_separator).empty() and id(mui_decimal_separator) != ".") {
              disp1->set_component_text(component.c_str(),
                                        adjustDecimalSeparator(txt, id(mui_decimal_separator)[0]).c_str());
            }

            // Value - Adjust font
            const uint8_t adjusted_length = adjusted_text_length(txt, "${half_width_chars}");
            // Decide which font to use based on adjusted length
            if (adjusted_length > 8 && adjusted_length <= 12) {
              disp1->set_component_font(component.c_str(), 1);
            } else if (adjusted_length > 12) {
              disp1->set_component_font(component.c_str(), 0);
            }
            return;
          }

  - id: !extend action_component_val
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component == "ent_value_xcen") {  // Entities pages alignment (0=Left, 1=Center, 2=Right)
            if (val > 2) {
              ESP_LOGW("${TAG_PAGE_ENTITIES}", "Invalid alignment value: %i (expected 0-2)", val);
              return;
            }
            ESP_LOGD("${TAG_PAGE_ENTITIES}", "Set value alignment on entities pages: %i", val);
            page_entities_value_horizontal_alignment = val;
            return;
          }
          if (component == "is_entitypages") {  // Visibility of entity pages button on page "Home"
            const uint8_t is_entitypages = (val > 0) ? 1 : 0;
            disp1->send_command_printf("vis_bt_entities=%d", is_entitypages);
            if (current_page_id == get_page_id("home")) {
              disp1->send_command_printf("vis bt_entities,%d", is_entitypages);
            }
          }

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("entitypage01")) page_entitypage->execute(1);
          else if (new_page_id == get_page_id("entitypage02")) page_entitypage->execute(2);
          else if (new_page_id == get_page_id("entitypage03")) page_entitypage->execute(3);
          else if (new_page_id == get_page_id("entitypage04")) page_entitypage->execute(4);

  - id: page_entitypage
    mode: single
    parameters:
      page_number: uint
    then:
      - lambda: |-
          // Set value alignment
          if (current_page_id == get_page_id("entitypage01") or
              current_page_id == get_page_id("entitypage02") or
              current_page_id == get_page_id("entitypage03") or
              current_page_id == get_page_id("entitypage04")) {
            for (uint8_t i = 1; i <= 8; ++i) {
              disp1->send_command_printf("value%02d.xcen=%" PRIu8, i, page_entities_value_horizontal_alignment);
            }
          }

  - id: !extend stop_page_constructors
    then:
      - lambda: |-
          page_entitypage->stop();
...
