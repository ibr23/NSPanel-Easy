#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - HARDWARE - Wi-Fi                                                           #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################
---
substitutions:
  ##############################
  ## Change only in your      ##
  ## local yaml substitutions ##
  ##############################
  TAG_HW_WIFI: nspanel.hw.wifi
  wifi_icon_colors: true
  _WIFI_ICON_COLORS: ${ 1 if wifi_icon_colors else 0 }

api:
  on_client_connected:
    then:
      - script.execute: refresh_wifi_icon
  on_client_disconnected:
    then:
      - lambda: |-
          refresh_wifi_icon->execute();
          wait_for_wifi->execute();

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_HW_WIFI

script:
  - id: !extend boot
    then:
      - lambda: |-
          wait_for_wifi->execute();

  - id: !extend boot_critical_components
    then:
      - if:
          condition:
            - not:
                wifi.enabled:
          then:
            - wifi.enable:

  - id: !extend dump_config
    then:
      # Report Wi-Fi status
      - lambda: |-
          if (wifi_component->is_connected()) {
            ESP_LOGCONFIG("${TAG_HW_WIFI}", "WiFi: Connected (%d dBm)", wifi_component->wifi_rssi());
          } else {
            ESP_LOGE("${TAG_HW_WIFI}", "WiFi: DISCONNECTED");
          }

  - id: !extend page_home
    then:
      - script.execute: refresh_wifi_icon

  - id: refresh_wifi_icon
    mode: single
    then:
      - lambda: |-
          // Determine current icon
          const char* icon_new = wifi_component->is_connected() ?
            (api_server->is_connected_with_state_subscription() ?
              (system_flags.blueprint_ready ?
                Icons::MDI_WIFI :
                Icons::MDI_HOME_ASSISTANT) :
              Icons::MDI_API_OFF) :
            Icons::MDI_WIFI_OFF;

          // Update WiFi icon (only when changed)
          static const char* icon_previous = nullptr;
          if (icon_new != icon_previous) {
            disp1->set_component_text("home.wifi_icon", icon_new);
            icon_previous = icon_new;
          }

          #if ${_WIFI_ICON_COLORS}
          // Determine new color based on connection state and WiFi signal strength
          uint16_t color_new;
          if (wifi_component->is_connected() &&
              api_server->is_connected_with_state_subscription() &&
              system_flags.blueprint_ready) {
            // All systems operational - color-code based on RSSI signal strength
            const int rssi = wifi_component->wifi_rssi();
            if (rssi >= -60) {
              // Good signal (>= -60 dBm): Green
              color_new = Colors::RGB565_GREEN;
            } else if (rssi >= -70) {
              // Fair signal (-60 to -70 dBm): Yellow
              color_new = Colors::RGB565_YELLOW;
            } else {
              // Poor signal (< -70 dBm): Orange
              color_new = Colors::RGB565_ORANGE;
            }
          } else {
            // Not fully operational (WiFi down, API down, or Blueprint not ready): Red
            color_new = Colors::RGB565_RED;
          }
          #else  // _WIFI_ICON_COLORS
          // Determine new color based on availability
          const uint16_t color_new = system_flags.blueprint_ready ? Colors::RGB565_GRAY_MOSS : Colors::RGB565_RED;
          #endif  // _WIFI_ICON_COLORS

          // Update WiFi icon color (only when changed)
          static uint16_t color_previous = 0;
          if (color_new != color_previous) {
            disp1->set_component_font_color("home.wifi_icon", static_cast<uint16_t>(color_new));
            color_previous = color_new;
          }

  - id: !extend stop_all
    then:
      - lambda: |-
          refresh_wifi_icon->stop();
          wait_for_wifi->stop();

  - id: wait_for_wifi
    mode: single
    then:
      - if:
          condition:
            - not:
                - wifi.enabled:
          then:
            - wifi.enable:
            - delay: 2s
      - lambda: |-
          if (not wifi_component->is_connected()) {
            wifi_component->enable();
            ESP_LOGW("DEBUG", "Retrying Wi-Fi connection");
            wifi_component->retry_connect();
          }
      - repeat:
          count: 300  # seconds
          then:
            - lambda: |-
                if (wifi_component->is_connected()) {
                  wait_for_wifi->stop();
                }
                if (iteration % 5 == 1) {  // Log every 5 seconds (at iterations 1, 6, 11, etc.)
                  boot_log->execute("Boot", "Waiting for Wi-Fi");
                }
            - delay: 1s

  - id: !extend watchdog_round
    then:
      - lambda: |-
          wait_for_wifi->execute();
          refresh_wifi_icon->execute();

text_sensor:
  - id: device_name  # Device name - Used by blueprint to find service's names
    name: Device Name
    platform: template
    icon: mdi:identifier
    entity_category: diagnostic
    internal: false
    disabled_by_default: false
    update_interval: never
    lambda: |-
      return { cached_device_name };

wifi:
  id: wifi_component
  networks:
    - id: wifi_default
      ssid: ${wifi_ssid}
      password: ${wifi_password}

  on_connect:
    then:
      - lambda: |-
          update_flag_api_ready->execute();
          if (cached_device_name.empty()) {
            bool last_was_underscore = false;
            for (const char& c : App.get_name()) {
              const unsigned char uc = static_cast<unsigned char>(c);
              if (std::isalnum(uc)) {
                cached_device_name += static_cast<char>(std::tolower(uc));  // Add alphanumeric characters as lowercase
                last_was_underscore = false;
              } else if (!last_was_underscore) {  // Replace non-alphanumeric with '_' but avoid consecutive '_'
                cached_device_name += '_';
                last_was_underscore = true;
              }
            }
            ESP_LOGI("${TAG_HW_WIFI}", "Device name: %s", cached_device_name.c_str());
            device_name->publish_state(cached_device_name.c_str());
          }

  on_disconnect:
    then:
      - lambda: |-
          update_flag_api_ready->execute();
          wait_for_wifi->execute();
...
