#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME - Page Settings                                                                   #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  TAG_PAGE_SETTINGS: nspanel.page.settings

display:
  - id: !extend disp1
    on_touch:
      then:
        - lambda: |-
            if (page_id != get_page_id("settings")) return;
            if (touch_event) return;  // Ignore any touch event and only act with release events
            if (component_id == 18) {  // Reboot button hotspot
              ESP_LOGW("${TAG_PAGE_SETTINGS}", "Restart button clicked");
              screen_power->turn_off();
              App.safe_reboot();
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_SETTINGS

number:
  - id: !extend display_brightness
    on_value:
      then:
        - lambda: |-
            if (current_page_id != get_page_id("settings")) return;
            disp1->set_component_value("brightslider", int(x));
            disp1->set_component_text_printf("bright_text", "%i%%", int(x));

  - id: !extend display_dim_brightness
    on_value:
      then:
        - lambda: |-
            if (current_page_id != get_page_id("settings")) return;
            disp1->set_component_value("dimslider", int(x));
            disp1->set_component_text_printf("dim_text", "%i%%", int(x));

script:
  - id: !extend event_from_display
    then:
      - lambda: |-
          if (params_count != 3) return;
          if (params[0] != "settings") return;

          // CSV Format: settings,<event>,<value>
          // params[0]=page, params[1]=event, params[2]=value

          const uint8_t value = atoi(params[2].c_str());

          if (params[1] == "theme") {
            // CSV Format: settings,theme,<target>
            // target: 0 = dark, 1 = light

            if (value > 1) return;
            auto call = background_type->make_call();
            call.set_index(value);
            call.perform();  // triggers background_type.on_value -> theme_update
            return;
          }

          if (params[1] != "bright" && params[1] != "dim") return;
          if (value > 100) return;

          auto call = (params[1] == "bright") ?
                      id(display_brightness).make_call() :
                      id(display_dim_brightness).make_call();
          call.set_value(value);
          call.perform();

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("settings"))
            page_settings->execute();

  - id: page_settings
    mode: single
    then:
      - lambda: |-
          if (current_page_id != get_page_id("settings")) return;
          disp1->set_component_text("lbl_reboot", "${LOCALIZATION[LANG].settings.reboot}");
          disp1->set_component_text("lbl_brightness", "${LOCALIZATION[LANG].settings.brightness}");
          disp1->set_component_text("lbl_bright", "${LOCALIZATION[LANG].settings.bright}");
          disp1->set_component_text("lbl_dim", "${LOCALIZATION[LANG].settings.dim}");

  - id: !extend stop_page_constructors
    then:
      - lambda: page_settings->stop();
...
