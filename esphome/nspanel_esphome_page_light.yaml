#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME - Page light                                                                      #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  BOOT_STEP_PAGE_LIGHT: 19
  PAGE_LIGHT_ID: 10
  TAG_PAGE_LIGHT: nspanel.page.light
  THEME_DARK_PIC_PAGE_LIGHT_DIM_BUTTON: 22
  THEME_DARK_PIC_PAGE_LIGHT_TEMP_BUTTON: 24
  THEME_DARK_PIC_PAGE_LIGHT_COLOR_BUTTON: 26
  THEME_DARK_PIC_PAGE_LIGHT_DIM_BUTTON_PRESSED: 23
  THEME_DARK_PIC_PAGE_LIGHT_TEMP_BUTTON_PRESSED: 25
  THEME_DARK_PIC_PAGE_LIGHT_COLOR_BUTTON_PRESSED: 27
  THEME_DARK_PIC_PAGE_LIGHT_COLORWHEEL: 17
  THEME_DARK_PIC_PAGE_LIGHT_TEMP_SLIDER: 21
  THEME_DARK_PIC_PAGE_LIGHT_DIM_SLIDER: 28
  THEME_DARK_PIC1_PAGE_LIGHT_DIM_SLIDER: 29
  THEME_LIGHT_PIC_PAGE_LIGHT_DIM_BUTTON: 76
  THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_BUTTON: 77
  THEME_LIGHT_PIC_PAGE_LIGHT_COLOR_BUTTON: 78
  THEME_LIGHT_PIC_PAGE_LIGHT_DIM_BUTTON_PRESSED: 67
  THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_BUTTON_PRESSED: 68
  THEME_LIGHT_PIC_PAGE_LIGHT_COLOR_BUTTON_PRESSED: 69
  THEME_LIGHT_PIC_PAGE_LIGHT_COLORWHEEL: 70
  THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_SLIDER: 71
  THEME_LIGHT_PIC_PAGE_LIGHT_DIM_SLIDER: 72
  THEME_LIGHT_PIC1_PAGE_LIGHT_DIM_SLIDER: 73

display:
  - id: !extend disp1
    on_touch:
      then:
        - lambda: |-
            if (
                  page_id == ${PAGE_LIGHT_ID} and  // Page light
                  !touch_event and                 // Release
                  component_id == 29               // power button
                ) {
              fire_ha_event("action_call", {
                {"action", "light.toggle"},
                {"entity", detailed_entity->state.c_str()}
              });
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_LIGHT

script:
  - id: !extend event_from_display
    then:
      - lambda: |-
          if (params[0] == "light") {
            // CSV Format varies by type:
            // light,brightness_pct,<value>
            // light,color_temp_kelvin,<value>
            // light,rgb_color,<red>,<green>,<blue>
            // light,<component>,<event>,<value>

            if (params_count < 3) {
              ESP_LOGW("${TAG_PAGE_LIGHT}", "Need 3+ params");
              return;
            }

            // Handle brightness and color temperature
            if (params[1] == "brightness_pct" or params[1] == "color_temp_kelvin") {
              if (params_count != 3) {
                ESP_LOGW("${TAG_PAGE_LIGHT}", "Need 3 params");
                return;
              }

              ESP_LOGV("${TAG_PAGE_LIGHT}", "key=%s, value=%s",
                        params[1].c_str(), params[2].c_str());

              fire_ha_event("action_call", {
                {"action", "light.turn_on"},
                {"key", params[1].c_str()},
                {"value", params[2].c_str()},
                {"entity", detailed_entity->state.c_str()}
              });

            } else if (params[1] == "rgb_color") {
              // RGB color: light,rgb_color,<red>,<green>,<blue>
              if (params_count != 5) {
                ESP_LOGW("${TAG_PAGE_LIGHT}", "Need 5 params");
                return;
              }

              ESP_LOGV("${TAG_PAGE_LIGHT}", "RGB: r=%s, g=%s, b=%s",
                        params[2].c_str(), params[3].c_str(), params[4].c_str());

              fire_ha_event("action_call", {
                {"action", "light.turn_on"},
                {"key", "rgb_color"},
                {"red", params[2].c_str()},
                {"green", params[3].c_str()},
                {"blue", params[4].c_str()},
                {"entity", detailed_entity->state.c_str()}
              });

            } else {
              // Generic event: light,<component>,<event>,<value>
              if (params_count != 4) {
                ESP_LOGW("${TAG_PAGE_LIGHT}", "Bad params");
                return;
              }

              ESP_LOGV("${TAG_PAGE_LIGHT}", "component=%s, event=%s, value=%s",
                        params[1].c_str(), params[2].c_str(), params[3].c_str());

              fire_ha_event("generic", {
                {"page", "light"},
                {"component", params[1].c_str()},
                {"event", params[2].c_str()},
                {"value", params[3].c_str()},
                {"entity", detailed_entity->state.c_str()}
              });
            }
          }

  - id: !extend page_change
    then:
      - lambda: if (new_page_id == ${PAGE_LIGHT_ID}) page_light->execute();

  - id: page_light
    mode: single
    then:  # There's nothing here so far

  - id: !extend stop_page_constructors
    then:
      - lambda: page_light->stop();

  - id: !extend theme_update_dark
    then:
      - lambda: |-
          disp1->set_component_pic("light.light_b_press", ${THEME_DARK_PIC_PAGE_LIGHT_DIM_BUTTON_PRESSED});
          disp1->set_component_pic("light.light_button", ${THEME_DARK_PIC_PAGE_LIGHT_DIM_BUTTON});
          disp1->set_component_pic("light.temp_b_press", ${THEME_DARK_PIC_PAGE_LIGHT_TEMP_BUTTON_PRESSED});
          disp1->set_component_pic("light.temp_button", ${THEME_DARK_PIC_PAGE_LIGHT_TEMP_BUTTON});
          disp1->set_component_pic("light.color_b_pres", ${THEME_DARK_PIC_PAGE_LIGHT_COLOR_BUTTON_PRESSED});
          disp1->set_component_pic("light.color_button", ${THEME_DARK_PIC_PAGE_LIGHT_COLOR_BUTTON});
          disp1->set_component_value("light.colorwheel_pic", ${THEME_DARK_PIC_PAGE_LIGHT_COLORWHEEL});
          disp1->set_component_value("light.tempslider_pic", ${THEME_DARK_PIC_PAGE_LIGHT_TEMP_SLIDER});
          disp1->set_component_value("light.lslider_pic", ${THEME_DARK_PIC_PAGE_LIGHT_DIM_SLIDER});
          disp1->set_component_value("light.lslider_pic1", ${THEME_DARK_PIC1_PAGE_LIGHT_DIM_SLIDER});

  - id: !extend theme_update_light
    then:
      - lambda: |-
          disp1->set_component_pic("light.light_b_press", ${THEME_LIGHT_PIC_PAGE_LIGHT_DIM_BUTTON_PRESSED});
          disp1->set_component_pic("light.light_button", ${THEME_LIGHT_PIC_PAGE_LIGHT_DIM_BUTTON});
          disp1->set_component_pic("light.temp_b_press", ${THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_BUTTON_PRESSED});
          disp1->set_component_pic("light.temp_button", ${THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_BUTTON});
          disp1->set_component_pic("light.color_b_pres", ${THEME_LIGHT_PIC_PAGE_LIGHT_COLOR_BUTTON_PRESSED});
          disp1->set_component_pic("light.color_button", ${THEME_LIGHT_PIC_PAGE_LIGHT_COLOR_BUTTON});
          disp1->set_component_value("light.colorwheel_pic", ${THEME_LIGHT_PIC_PAGE_LIGHT_COLORWHEEL});
          disp1->set_component_value("light.tempslider_pic", ${THEME_LIGHT_PIC_PAGE_LIGHT_TEMP_SLIDER});
          disp1->set_component_value("light.lslider_pic", ${THEME_LIGHT_PIC_PAGE_LIGHT_DIM_SLIDER});
          disp1->set_component_value("light.lslider_pic1", ${THEME_LIGHT_PIC1_PAGE_LIGHT_DIM_SLIDER});
...
