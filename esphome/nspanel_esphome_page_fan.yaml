#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME Page fan                                                                          #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  TAG_PAGE_FAN: nspanel.page.fan

display:
  - id: !extend disp1
    on_touch:
      then:
        - lambda: |-
            if (
                  page_id == get_page_id("fan") and  // Page fan
                  !touch_event                   // Only act with release
                ) {
              switch (component_id) {
                case 13:  // bt_oscillate
                  fire_ha_event("action_call", {
                    {"action", "fan.oscillate"},
                    {"key", "oscillating"},
                    {"value", "toggle"},
                    {"entity", detailed_entity->state.c_str()}
                  });
                  break;
                case 14:  // power_button
                  fire_ha_event("action_call", {
                    {"action", "fan.toggle"},
                    {"entity", detailed_entity->state.c_str()}
                  });
                  break;
                case 15:  // mode_button
                  popup_select_open->execute(
                    get_page_id("fan"),
                    std::string("${LOCALIZATION[LANG].fan.select_preset_mode}")
                  );
                  break;
              }
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_FAN

script:
  - id: !extend event_from_display
    then:
      - lambda: |-
          if (params[0] == "fan" and params[1] == "percentage") {
            // CSV Format: fan,percentage,<value>
            // params[0]=page, params[1]=percentage, params[2]=value

            if (params_count != 3) {
              ESP_LOGW("${TAG_PAGE_FAN}", "Bad params");
              return;
            }

            const std::string& value = params[2];

            ESP_LOGV("${TAG_PAGE_FAN}", "Fan speed: %s%%", value.c_str());

            if (value == "0") {
              ESP_LOGV("${TAG_PAGE_FAN}", "Turn-off fan");

              fire_ha_event("action_call", {
                {"action", "fan.turn_off"},
                {"entity", detailed_entity->state.c_str()}
              });
            } else {
              ESP_LOGV("${TAG_PAGE_FAN}", "Set fan speed");

              fire_ha_event("action_call", {
                {"action", "fan.turn_on"},
                {"key", "percentage"},
                {"value", value.c_str()},
                {"entity", detailed_entity->state.c_str()}
              });
            }
          }

  - id: !extend page_change
    then:
      - lambda: if (new_page_id == get_page_id("fan")) page_fan->execute();

  - id: page_fan
    mode: single
    then:  # There's nothing here so far

  - id: !extend picker_selected
    then:
      - lambda: |-
          if (context != "fan_preset_mode") return;

          if (mask == 0) {
            // No selection — fan entities always have a current preset mode if they support it;
            // deselect tap is a no-op for v1.
            ESP_LOGV("${TAG_PAGE_FAN}", "fan_preset_mode deselect ignored");
            return;
          }

          ESP_LOGD("${TAG_PAGE_FAN}", "Dispatch: fan.set_preset_mode entity='%s' preset_mode='%s'", entity.c_str(),
                                                                                                    value.c_str());

          fire_ha_event("action_call", {
            {"action", "fan.set_preset_mode"},
            {"entity", entity.c_str()},
            {"key", "preset_mode"},
            {"value", value.c_str()}
          });

  - id: !extend reset_globals
    then:
      - lambda: |-
          if (new_page_id == get_page_id("fan")) {
            display_entity_keep = true;
          }

  - id: !extend stop_page_constructors
    then:
      - lambda: page_fan->stop();
...
