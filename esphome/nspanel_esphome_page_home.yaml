#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME Page Home                                                                         #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  TAG_PAGE_HOME: nspanel.page.home
  THEME_DARK_PIC_PAGE_HOME_WEATHER_OFFSET: 48

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_HOME
      - -D NSPANEL_EASY_USE_WEATHER

globals:
  - id: is_climate
    type: bool
    restore_value: true
    initial_value: 'true'

  - id: weather_pic
    type: uint8_t
    restore_value: true
    initial_value: '1'

  ##### Date/time formats #####
  - id: home_date_color
    type: uint16_t
    restore_value: true
    initial_value: '65535'
  - id: home_time_color
    type: uint16_t
    restore_value: true
    initial_value: '65535'

  ##### Chips #####
  - id: home_chip_font_id
    type: uint8_t
    restore_value: true
    initial_value: '7'

  #### Custom buttons ####
  - id: home_custom_buttons_font_id
    type: uint8_t
    restore_value: true
    initial_value: '8'

script:
  - id: !extend action_component_color
    then:
      - lambda: |-
          if (display_mode == 4) return;  // To do: Implement logic for new format
          if (page != "mem") return;
          if (component == "date_color") {
            id(home_date_color) = color;
            disp1->set_component_font_color(hmi::home::DATE.name, color);
            return;
          }
          if (component == "time_color") {
            id(home_time_color) = color;
            disp1->set_component_font_color(hmi::home::TIME.name, color);
            return;
          }

  - id: !extend action_component_text
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component == "weather_state") {
            weather_condition_index = get_weather_index(txt.c_str());
            page_home_weather_update->execute();
            return;
          }

  - id: !extend action_component_val
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component == "is_climate") {
            id(is_climate) = (val != 0);
            return;
          }
          if (component == "chip_font") {
            // Chips icon size
            disp1->set_component_font(hmi::home::CHIP_CLIMATE.name, val);
            feed_wdt_delay(${DELAY_DEFAULT});
            for (int i = 1; i <= 7; ++i) {
              disp1->send_command_printf("home.chip%02d.font=%" PRIi32, i, val);
              feed_wdt_delay(${DELAY_SHORT});
            }
            feed_wdt_delay(${DELAY_DEFAULT});
            disp1->set_component_font(hmi::home::WIFI_ICON.name, val);
            disp1->set_component_font(hmi::home::BT_ICON.name, val);
            id(home_chip_font_id) = val;
            return;
          }
          if (component == "custom_buttons_font") {
            // Custom buttons icon size
            id(home_custom_buttons_font_id) = val;
            for (int i = 1; i <= 7; ++i) {
              disp1->send_command_printf("home.button%02d.font=%" PRIu8, i, val);
              feed_wdt_delay(${DELAY_SHORT});
            }
            feed_wdt_delay(${DELAY_DEFAULT});
            disp1->set_component_font(hmi::home::BT_NOTIFIC.name, val);
            disp1->set_component_font(hmi::home::BT_QRCODE.name, val);
            disp1->set_component_font(hmi::home::BT_ENTITIES.name, val);
            blueprint_status_flags.page_home = true;
            return;
          }
          if (component == "outdoor_temp_font") {  // Outdoor temperature font size
            disp1->set_component_font(hmi::home::OUTDOOR_TEMP.name, val);
            return;
          }
          if (component == "weather_pic") {  // Weather picture (theme-based)
            id(weather_pic) = static_cast<uint8_t>(val);
            page_home_weather_pic->execute();
            return;
          }

  - id: !extend action_icon
    then:
      - lambda: |-
          // Only applies to home page buttons (button01..button08) on new design
          if (display_mode != 4) return;
          if (!is_home_page) return;
          if (!is_current_page) return;  // cirs only affects the visible page

          // Extract the numeric suffix from component_id, e.g. "button01" -> 1
          // Expected format: "button%02u" — prefix is exactly 6 chars ("button")
          constexpr uint8_t BUTTON_PREFIX_LEN = 6u;  // strlen("button")
          constexpr uint8_t BUTTON_COUNT      = 8u;

          const std::string comp_id(component.component_id);
          if (comp_id.length() != BUTTON_PREFIX_LEN + 2u ||
              comp_id.substr(0u, BUTTON_PREFIX_LEN) != "button") {
            return;  // Not a home button component
          }

          // Parse the two-digit index; reject non-numeric suffixes
          const std::string suffix = comp_id.substr(BUTTON_PREFIX_LEN);
          if (!std::isdigit(static_cast<unsigned char>(suffix[0])) ||
              !std::isdigit(static_cast<unsigned char>(suffix[1]))) {
            return;  // Not a valid button component
          }
          const uint8_t button_id = static_cast<uint8_t>(std::stoi(suffix));

          // Validate extracted index range [1..8]
          if (button_id < 1u || button_id > BUTTON_COUNT) {
            ESP_LOGW("${TAG_PAGE_HOME}", "Button id %" PRIu8 " out of range [1..%" PRIu8 "]",
                      button_id, BUTTON_COUNT);
            return;
          }

          // Only draw the circle when the blueprint has populated the icon
          if (icon.empty()) {
            ESP_LOGD("${TAG_PAGE_HOME}", "%s has no icon, skipping circle", component.component_id);
            return;
          }

          // Compute circle X-center: button01 -> 32, button02 -> 86, ... (+54 per step)
          const uint16_t circle_x      = 32u + static_cast<uint16_t>(button_id - 1u) * 54u;
          const uint16_t circle_y      = 257u;
          const uint16_t circle_radius = 22u;

          // Draw the filled circle behind the button, then trigger a repaint
          disp1->send_command_printf("cirs %" PRIu16 ",%" PRIu16 ",%" PRIu16 ",color_containers",
                                      circle_x, circle_y, circle_radius);
          feed_wdt_delay(${DELAY_SHORT});
          disp1->send_command_printf("ref %s", component.component_id);

          ESP_LOGD("${TAG_PAGE_HOME}", "Drew circle for %s at (%" PRIu16 ",%" PRIu16 ")",
                    component.component_id, circle_x, circle_y);

  - id: !extend boot_nextion
    then:
      - lambda: |-
          // Setup Home page
          boot_log->execute("Boot", "Set Home page elements");

          // Bluetooth icon
          #if defined(USE_ESP32_BLE_SERVER) || defined(USE_ESP32_BLE_CLIENT) || defined(USE_BLUETOOTH_PROXY)
          action_component_visibility->execute("home", "bt_icon", true);
          #endif

          // Chips icon size
          for (uint8_t i = 1; i <= 7; ++i) {
            disp1->send_command_printf("home.chip%02d.font=%i", i, id(home_chip_font_id));
            feed_wdt_delay(${DELAY_SHORT});
          }
          feed_wdt_delay(${DELAY_DEFAULT});

          // Custom buttons icon size
          for (uint8_t i = 1; i <= 7; ++i) {
            disp1->send_command_printf("home.button%02d.font=%i", i, id(home_custom_buttons_font_id));
            feed_wdt_delay(${DELAY_SHORT});
          }
          feed_wdt_delay(${DELAY_DEFAULT});

          // Other components icons size and color
          disp1->set_component_font(hmi::home::BT_ENTITIES.name, id(home_custom_buttons_font_id));
          disp1->set_component_font(hmi::home::WIFI_ICON.name, id(home_chip_font_id));
          feed_wdt_delay(${DELAY_DEFAULT});

  - id: !extend boot_wrap_up
    then:
      - script.execute: page_home_weather_pic

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("home"))
            page_home->execute();

  - id: page_home
    mode: single
    then:
    # Extended by:
    # - hw_relays

  - id: page_home_weather_pic
    mode: restart
    then:
      - lambda: |-
          const uint8_t weather_pic_corrected = id(weather_pic) +
                                ((current_theme == ThemeMode::LIGHT) ? ${THEME_DARK_PIC_PAGE_HOME_WEATHER_OFFSET} : 0);
          ESP_LOGD("${TAG_PAGE_HOME}", "Update weather pic: %" PRIu8, weather_pic_corrected);
          disp1->set_component_pic(hmi::home::WEATHER.name, weather_pic_corrected);
          if (display_mode==4) {  // To do: Implement logic for new format
            disp1->send_command_printf("home_weather_pic=%" PRIu8, id(weather_pic));
          }

  - id: page_home_weather_update
    mode: restart
    then:


  - id: !extend stop_all
    then:
      - lambda: |-
          page_home->stop();  // Page home is an exception to the stop_page_constructor, as it can be constructed in the background
          page_home_weather_pic->stop();
          page_home_weather_update->stop();
...
