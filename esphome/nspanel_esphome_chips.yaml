#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - CHIPS                                                                      #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################
---
substitutions:
  TAG_CHIPS: nspanel.chips

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_CHIPS

globals:
  # Font ID used for all chip icons. Persisted so relay chips can render
  # correctly before the blueprint reconnects after a reboot.
  - id: chip_font_id
    type: uint8_t
    restore_value: true
    initial_value: '7'  # 24px — matches blueprint default chip_font_size

script:
  - id: !extend action_icon
    then:
      - lambda: |-
          if (page != "chips") return;  // Only handle chip components (limited pages)

          const uint8_t idx = find_chip_index(component_id);
          if (idx == UINT8_MAX) return;

          // Update shadow state
          ChipState &the_chip = chip_states[idx];

          // Render immediately if on a supported page (full render — icon+color just updated)
          if (strcmp(the_chip.icon, icon.c_str()) != 0) {
            strncpy(the_chip.icon, icon.c_str(), sizeof(the_chip.icon) - 1);
            the_chip.icon[sizeof(the_chip.icon) - 1] = '\0';
            if (is_chips_page)
              disp1->set_component_text(CHIP_NAMES[idx], the_chip.icon);
          }
          if (icon_color >= 0 && the_chip.color != static_cast<uint16_t>(icon_color)) {
            the_chip.color = static_cast<uint16_t>(icon_color);
            if (is_chips_page)
              disp1->set_component_font_color(CHIP_NAMES[idx], the_chip.color);
          }
          if (the_chip.visible != visible) {
            the_chip.visible = visible;
            if (is_chips_page)
              disp1->set_component_visibility(CHIP_NAMES[idx], visible);
          }
          ESP_LOGV("${TAG_CHIPS}", "action_icon: chip[%" PRIu8 "] (%s) color=%" PRIu16 " vis=%s",
                    idx, CHIP_NAMES[idx], the_chip.color, YESNO(the_chip.visible));

  - id: !extend action_component_val
    then:
      - lambda: |-
          if (page != "mem") return;
          if (component != "chip_font") return;

          const uint8_t new_font = static_cast<uint8_t>(val);
          if (new_font == id(chip_font_id)) {
            ESP_LOGV("${TAG_CHIPS}", "chip_font unchanged (%" PRIu8 "), skipping", new_font);
            return;
          }
          id(chip_font_id) = new_font;
          ESP_LOGD("${TAG_CHIPS}", "chip font updated: %" PRIu8, new_font);

          // Keep the Nextion-side global in sync for page initializers
          disp1->send_command_printf("chip_font=%" PRIu8, new_font);

          // Update chip-like global components on page home
          disp1->set_component_font(hmi::home::WIFI_ICON.name, new_font);
          disp1->set_component_font(hmi::home::BT_ICON.name, new_font);

          // Apply font to all chip components on the current page (if supported)
          if (!is_chips_page) return;
          for (uint8_t i = 0; i < CHIP_COUNT; ++i) {
            disp1->send_command_printf("%s.font=%" PRIu8, CHIP_NAMES[i], new_font);
          }

  - id: !extend action_component_color
    then:
      - lambda: |-
          if (page != "chips") return;

          const uint8_t idx = find_chip_index(component);
          if (idx == UINT8_MAX) return;

          ChipState &the_chip = chip_states[idx];
          if (the_chip.color == color) return;

          the_chip.color = color;
          if (is_chips_page)
            disp1->set_component_font_color(CHIP_NAMES[idx], color);

  - id: !extend action_component_text
    then:
      - lambda: |-
          if (page != "chips") return;

          const uint8_t idx = find_chip_index(component);
          if (idx == UINT8_MAX) return;

          ChipState &the_chip = chip_states[idx];
          if (strcmp(the_chip.icon, txt.c_str()) == 0) return;

          strncpy(the_chip.icon, txt.c_str(), sizeof(the_chip.icon) - 1);
          the_chip.icon[sizeof(the_chip.icon) - 1] = '\0';
          if (is_chips_page)
            disp1->set_component_text(CHIP_NAMES[idx], the_chip.icon);

  - id: !extend action_component_visibility
    then:
      - lambda: |-
          if (page != "chips") return;

          const uint8_t idx = find_chip_index(component);
          if (idx == UINT8_MAX) return;

          if (chip_states[idx].visible != visible) {
            chip_states[idx].visible = visible;
            if (is_chips_page)
              disp1->set_component_visibility(CHIP_NAMES[idx], visible);
          }

  - id: !extend boot_nextion
    then:
      - lambda: |-
          disp1->send_command_printf("chip_font=%" PRIu8, id(chip_font_id));

  - id: !extend dump_config
    then:
      - lambda: |-
          ESP_LOGCONFIG("${TAG_CHIPS}", "Chips");
          ESP_LOGCONFIG("${TAG_CHIPS}", "  Font: %" PRIu8, id(chip_font_id));

  - id: !extend page_change
    then:
      - lambda: |-
          is_chips_page = (new_page_id == get_page_id("boot")
                        || new_page_id == get_page_id("home")
                        || new_page_id == get_page_id("screensaver"));
          if (!is_chips_page) return;

          ESP_LOGV("${TAG_CHIPS}", "Rendering chips");
          for (uint8_t chip_index = 0; chip_index < CHIP_COUNT; ++chip_index) {
            const char *name = CHIP_NAMES[chip_index];
            const ChipState &the_chip = chip_states[chip_index];
            ESP_LOGV("${TAG_CHIPS}", "render chip[%" PRIu8 "]: %s vis=%s", chip_index, name, YESNO(the_chip.visible));
            disp1->set_component_visibility(name, the_chip.visible);
            disp1->set_component_font_color(name, the_chip.color);
            disp1->set_component_text(name, the_chip.icon);
          }  // for each chip
...
