#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME CORE - Page utilities                                                             #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  TAG_PAGE_UTILITIES: nspanel.page.utilities

api:
  actions:
    # Utilities group refresh
    - action: utilities_group_refresh
      variables:
        group_id: string
        value1: string
        value2: string
        direction: int
        constructor: bool
      then:
        - lambda: |-
            ESP_LOGV("${TAG_API}", "Action: utilities_group_refresh");
            ESP_LOGV("${TAG_API}", "  group_id: %s", group_id.c_str());
            ESP_LOGV("${TAG_API}", "  value1: %s", value1.c_str());
            ESP_LOGV("${TAG_API}", "  value2: %s", value2.c_str());
            ESP_LOGV("${TAG_API}", "  direction: %i", direction);
            ESP_LOGV("${TAG_API}", "  constructor: %s", YESNO(constructor));
            if (group_id.empty()) {
              ESP_LOGW("${TAG_API}", "`group_id` is empty");
              return;
            }

            uint8_t id = findUtilitiesGroupIndex(group_id.c_str());
            if (id == UINT8_MAX) {
              ESP_LOGW("${TAG_API}", "`group_id` not found");
              return;
            }
            // Update Value 1
            if (!value1.empty() and
                (constructor or strcmp(value1.c_str(), UtilitiesGroups[id].value1) != 0)) {
              copyStringToCharArray(UtilitiesGroups[id].value1, value1);
              disp1->set_component_text(group_id.c_str(), value1.c_str());
              App.feed_wdt();
            }

            // Update Value 2
            if (!value2.empty() and
                (constructor or strcmp(value2.c_str(), UtilitiesGroups[id].value2) != 0)) {
              copyStringToCharArray(UtilitiesGroups[id].value2, value2);
              disp1->set_component_text((group_id + "b").c_str(), value2.c_str());
              App.feed_wdt();
            }

            // Update direction
            if (group_id != "grid" and (constructor or direction != UtilitiesGroups[id].direction)) {
              UtilitiesGroups[id].direction = direction;
              disp1->set_component_value((group_id + "_line_d").c_str(), direction);
              App.feed_wdt();
            }

display:
  - id: !extend disp1
    on_touch:
      then:
        - lambda: |-
            if (!page_utilities_enabled) return;               // There's not to do if page utilities is disabled
            if (touch_event) return;                           // Ignore the touch, so only the release will be used
            if (page_id != get_page_id("home")) return;        // Only on page `home`
            if (component_id == hmi::home::BT_UTILITIES.id) {  // Utilities button
              goto_page->execute(get_page_id("utilities"));
              return;
            }

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_UTILITIES

script:
  - id: !extend action_icon
    then:
      - lambda: |-
          if (!is_home_page) return;
          if (component_id != "bt_utilities") return;
          page_utilities_enabled = visible;
          disp1->send_command_printf("vis_bt_utilities=%" PRIu8, visible ? 1 : 0);
          if (is_current_page) disp1->set_component_visibility("bt_utilities", visible);
          ESP_LOGV("${TAG_PAGE_UTILITIES}", "page_utilities_enabled: %s", TRUEFALSE(page_utilities_enabled));

  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id == get_page_id("utilities")) page_utilities->execute();

  - id: page_utilities
    mode: single
    then:
      - lambda: if (UtilitiesGroups.empty()) resetUtilitiesGroups();

  - id: !extend stop_page_constructors
    then:
      - lambda: page_utilities->stop();
...
