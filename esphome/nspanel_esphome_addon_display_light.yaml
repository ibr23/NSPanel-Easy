#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME ADD-ON - DISPLAY LIGHT                                                            #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################
---
substitutions:
  TAG_ADDON_DISPLAY_LIGHT: nspanel.addon.display_light

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_ADDON_DISPLAY_LIGHT

light:
  # Add the display as a light in Home Assistant
  - id: display_light
    name: Display
    icon: mdi:tablet-dashboard
    platform: monochromatic
    output: display_output
    default_transition_length: 0s
    gamma_correct: 0
    on_turn_on:
      then:
        - lambda: |-
            // Skip during boot to avoid interfering with boot sequence
            if (!system_flags.boot_completed || current_page_id == get_page_id("boot")) {
              ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping turn_on - boot not complete");
              return;
            }
            if (current_page_id == get_page_id("screensaver")) disp1->goto_page(wakeup_page_id);
            timer_reset_all->execute();
    on_turn_off:
      then:
        - lambda: |-
            // Skip during boot to avoid interfering with boot sequence
            if (!system_flags.boot_completed || current_page_id == get_page_id("boot")) {
              ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping turn_off - boot not complete");
              return;
            }
            goto_page->execute(get_page_id("screensaver"));

output:
  # Output required by `display_light` to send the commands to Nextion
  - id: display_output
    platform: template
    type: float
    write_action:
      - lambda: |-
          // Skip during boot to avoid interfering with boot sequence
          if (!system_flags.boot_completed || current_page_id == get_page_id("boot")) {
            ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping brightness change - boot not complete");
            return;
          }
          ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "state: %f", state);
          uint8_t target_brightness = int(round(state * 100.0f));
          ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "target_brightness: %" PRIu8 "%%", target_brightness);
          // Set flag to prevent feedback loop in extended set_brightness
          display_light_updating = true;
          set_brightness->execute(target_brightness);
          display_light_updating = false;

script:
  - id: !extend dump_config
    then:
      - lambda: |-
          ESP_LOGCONFIG("${TAG_ADDON_DISPLAY_LIGHT}", "Add-on 'Display as a light'");

  # Updates the existing `page_change` script to update the `display_light` status when a page changes
  - id: !extend page_change
    then:
      - lambda: |-
          // Skip during boot to avoid interfering with boot sequence
          if (!system_flags.boot_completed || current_page_id == get_page_id("boot")) {
            ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping page_change sync - boot not complete");
            return;
          }
          ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "is_on(): %s", display_light->current_values.is_on() ? "True" : "False");
          if (current_page_id == get_page_id("screensaver") && display_light->current_values.is_on()) {
            auto call = display_light->turn_off();
            call.perform();
          } else if (current_page_id != get_page_id("screensaver") && !display_light->current_values.is_on()) {
            auto call = display_light->turn_on();
            call.perform();
          }

  # Updates the existing `set_brightness` script to update the `display_light` status when a new brightness level is set
  - id: !extend set_brightness
    then:
      - lambda: |-
          // Skip during boot to avoid interfering with boot sequence
          if (!system_flags.boot_completed || current_page_id == get_page_id("boot")) {
            ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping set_brightness sync - boot not complete");
            return;
          }
          // Skip if this call came from display_light itself to prevent feedback loop
          if (display_light_updating) {
            ESP_LOGV("${TAG_ADDON_DISPLAY_LIGHT}", "Skipping set_brightness sync - updating from light");
            return;
          }
          uint8_t current_light_brightness = int(round(display_light->current_values.is_on() ? (display_light->current_values.get_brightness() * 100.0f) : 0.0));
          if (brightness != current_light_brightness) {
            if (current_page_id != get_page_id("screensaver") && brightness > 0) {
              auto call = display_light->turn_on();
              call.set_brightness(brightness / 100.0f);
              call.perform();
            } else if (display_light->current_values.is_on()) {
              auto call = display_light->turn_off();
              call.set_brightness(0);
              call.perform();
            }
          }
...
