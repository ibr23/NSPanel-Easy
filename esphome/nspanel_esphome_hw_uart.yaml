#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME HARDWARE - UART                                                                   #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  ##############################
  ## Change only in your      ##
  ## local yaml substitutions ##
  ##############################
  BAUD_RATE: "921600"                 # Target operating baud rate
  BAUD_RATE_FALLBACK: "115200"        # Fallback for stock/legacy Nextion firmware
  BAUD_RATE_UPGRADE_RETRIES: "3"      # Max renegotiation attempts back to primary rate
  BAUD_RATE_UPGRADE_PROBE_MS: "5000"  # Probe window after baud upgrade command (ms)
  GPIO_DISPLAY_NEXTION_RX_PIN: 17
  GPIO_DISPLAY_NEXTION_TX_PIN: 16
  TAG_HW_UART: nspanel.hw.uart

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_HW_UART

script:
  # ---------------------------------------------------------------------------
  # baud_negotiate
  #
  # Called when the Nextion fails to set up at BAUD_RATE (primary rate).
  # Switches the ESP UART to BAUD_RATE_FALLBACK, power-cycles the display,
  # and waits for on_setup to fire at the fallback rate.
  #
  # On fallback success:
  #   version_tft == 0  -> stock or foreign TFT; stay at fallback and delegate
  #                         reparse exit to upload_tft as normal.
  #   version_tft  > 0  -> old NSPanel Easy / Blackymas TFT (program.s = 115200);
  #                         hand off to baud_upgrade to renegotiate primary rate.
  #
  # On fallback failure:
  #   Exit silently; the wait_for_display reboot loop takes over.
  # ---------------------------------------------------------------------------
  - id: baud_negotiate
    mode: single
    then:
      - lambda: |-
          #if ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
            if (!system_flags.baud_negotiation_enabled) {
              ESP_LOGW("${TAG_HW_UART}", "Baud negotiate: called with negotiation disabled - stopping");
              baud_negotiate->stop();
              return;
            }
            ESP_LOGW("${TAG_HW_UART}", "Baud negotiate: primary rate %" PRIu32 " bps failed",
                                        static_cast<uint32_t>(${BAUD_RATE}));
            ESP_LOGI("${TAG_HW_UART}", "Baud negotiate: switching UART to fallback %" PRIu32 " bps",
                                        static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
            boot_log->execute("Baud", "Trying fallback rate");

            // Flush RX before sending the rate-change command
            while (tf_uart->available()) {
              uint8_t discard;
              tf_uart->read_byte(&discard);
            }

            // Instruct Nextion to switch to fallback rate (session only)
            disp1->send_command_printf("baud=%" PRIu32, static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
          #else
            ESP_LOGW("${TAG_HW_UART}", "Baud negotiate: called with equal rates - stopping");
            baud_negotiate->stop();
          #endif  // ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}

      # Wait for TX to drain and Nextion to finish transmitting at old rate
      - script.execute: wait_for_uart_drain
      - script.wait: wait_for_uart_drain
      - delay: 150ms

      - lambda: |-
          #if ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
            // Switch ESP UART to fallback rate
            tf_uart->set_baud_rate(${BAUD_RATE_FALLBACK});
            tf_uart->load_settings();
            baud_rate_active->update();

            // Synchronously flush RX - absorbs post-switch noise and Nextion
            // restart bytes before the component resumes parsing
            const uint32_t flush_until = millis() + 500;
            uint32_t discarded = 0;
            while (millis() < flush_until) {
              while (tf_uart->available()) {
                uint8_t discard;
                tf_uart->read_byte(&discard);
                ++discarded;
              }
              delay(1);
              App.feed_wdt();
            }
            if (discarded > 0)
              ESP_LOGD("${TAG_HW_UART}", "Baud negotiate: flushed %" PRIu32 " rx byte(s) post-switch", discarded);
          #endif  // ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}

      # Power-cycle so the Nextion re-sends its init sequence at fallback rate
      - switch.turn_off: screen_power
      - delay: 2s
      - switch.turn_on: screen_power

      - wait_until:
          condition:
            - lambda: return disp1->is_setup();
          timeout: 19s

      - if:
          condition:
            - lambda: return !disp1->is_setup();
          then:
            - lambda: |-
                ESP_LOGE("${TAG_HW_UART}", "Baud negotiate: fallback rate also failed");
                boot_log->execute("Baud", "Fallback also failed");
          else:
            - lambda: |-
                system_flags.baud_fallback_active = true;
                system_flags.baud_rate_set = true;
                ESP_LOGW("${TAG_HW_UART}", "Baud negotiate: connected at fallback %" PRIu32 " bps",
                                            static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
                boot_log->execute("Baud", "Connected at fallback rate");
            - script.execute: wait_for_version_tft
            - script.wait: wait_for_version_tft
            - if:
                condition:
                  - lambda: |-
                      if (version_tft->state.empty()) return false;
                      int major = 0;
                      sscanf(version_tft->state.c_str(), "%d", &major);
                      return major > 0;
                then:
                  - script.execute: baud_upgrade
                  - script.wait: baud_upgrade
                else:
                  - lambda: |-
                      ESP_LOGI("${TAG_HW_UART}", "Baud negotiate: stock/foreign TFT (version=0), "
                                                "staying at fallback rate; upload_tft handles reparse exit");
                      boot_log->execute("Baud", "Stock TFT - stay at fallback");

  # ---------------------------------------------------------------------------
  # baud_upgrade
  #
  # Called after a successful fallback connection with our TFT confirmed
  # (version_tft > 0, program.s still sets 115200). Sends the session-only
  # Nextion baud command, switches the ESP UART, then probes for any response
  # bytes within BAUD_RATE_UPGRADE_PROBE_MS to confirm the switch succeeded.
  #
  # Uses `baud` (session only), NOT `bauds` (flash write). The new TFT's
  # program.s will enforce BAUD_RATE on every subsequent boot, so no
  # persistent write is needed.
  #
  # Retries up to BAUD_RATE_UPGRADE_RETRIES times. On exhaustion, stays at
  # the fallback rate for this session and logs a warning.
  # ---------------------------------------------------------------------------
  - id: baud_upgrade
    mode: single
    then:
      - lambda: |-
          #if ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
            if (!system_flags.baud_negotiation_enabled) {
              ESP_LOGW("${TAG_HW_UART}", "Baud upgrade: called with negotiation disabled - stopping");
              baud_upgrade->stop();
              return;
            }
            ESP_LOGI("${TAG_HW_UART}", "Baud upgrade: attempting to upgrade to %" PRIu32 " bps",
                                        static_cast<uint32_t>(${BAUD_RATE}));
            boot_log->execute("Baud", "Upgrading to primary rate");
          #else
            ESP_LOGW("${TAG_HW_UART}", "Baud upgrade: called with equal rates - stopping");
            baud_upgrade->stop();
          #endif  // ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}

      - repeat:
          count: ${BAUD_RATE_UPGRADE_RETRIES}
          then:
            - lambda: |-
                if (!system_flags.baud_fallback_active) return;

                ESP_LOGD("${TAG_HW_UART}", "Baud upgrade: attempt %u / %u",
                                            static_cast<unsigned>(iteration + 1u),
                                            static_cast<unsigned>(${BAUD_RATE_UPGRADE_RETRIES}));
                ESP_LOGD("${TAG_HW_UART}", "Baud upgrade: waiting for queues to drain");

            # Wait for both the Nextion command queue and the UART RX buffer
            # to be empty before issuing the baud change command. The boot
            # sequence may have queued many display commands that must complete
            # at the current rate before we switch.
            - wait_until:
                condition:
                  - lambda: return (disp1->queue_size() == 0 && tf_uart->available() == 0);
                timeout: 10s

            - lambda: |-
                if (!system_flags.baud_fallback_active) return;

                // Flush any residual RX bytes after queue drain
                while (tf_uart->available()) {
                  uint8_t discard;
                  tf_uart->read_byte(&discard);
                }

                // Instruct Nextion to switch to primary rate (session only)
                disp1->send_command_printf("baud=%" PRIu32, static_cast<uint32_t>(${BAUD_RATE}));

            # Wait for TX to drain and Nextion to finish at old rate
            - script.execute: wait_for_uart_drain
            - script.wait: wait_for_uart_drain
            - delay: 150ms

            - lambda: |-
                if (!system_flags.baud_fallback_active) return;

                // Switch ESP UART to primary rate
                tf_uart->set_baud_rate(${BAUD_RATE});
                tf_uart->load_settings();
                baud_rate_active->update();

                // Synchronously flush RX post-switch noise
                const uint32_t flush_until = millis() + 500;
                uint32_t discarded = 0;
                while (millis() < flush_until) {
                  while (tf_uart->available()) {
                    uint8_t discard;
                    tf_uart->read_byte(&discard);
                    ++discarded;
                  }
                  delay(1);
                  App.feed_wdt();
                }
                if (discarded > 0)
                  ESP_LOGD("${TAG_HW_UART}", "Baud upgrade: flushed %" PRIu32 " rx byte(s) post-switch", discarded);

                // Send probe and wait synchronously for a response.
                // We must not yield to the main loop here — the component's
                // RX processing would consume the response bytes before we
                // can see them via tf_uart->available().
                ESP_LOGD("${TAG_HW_UART}", "Baud upgrade: sending probe");
                disp1->send_command("get sleep");

                // Spin for up to BAUD_RATE_UPGRADE_PROBE_MS waiting for bytes
                const uint32_t probe_until = millis() + ${BAUD_RATE_UPGRADE_PROBE_MS};
                bool got_response = false;
                while (millis() < probe_until) {
                  if (tf_uart->available() > 0) {
                    got_response = true;
                    break;
                  }
                  delay(1);
                  App.feed_wdt();
                }

                if (got_response) {
                  // Flush probe response bytes
                  while (tf_uart->available()) {
                    uint8_t discard;
                    tf_uart->read_byte(&discard);
                  }
                  system_flags.baud_fallback_active = false;
                  ESP_LOGI("${TAG_HW_UART}", "Baud upgrade: success - now at %" PRIu32 " bps",
                                              static_cast<uint32_t>(${BAUD_RATE}));
                  boot_log->execute("Baud", "Upgraded to primary rate");
                } else {
                  ESP_LOGW("${TAG_HW_UART}", "Baud upgrade: probe failed on attempt %u - reverting UART",
                                              static_cast<unsigned>(iteration + 1u));
                  tf_uart->set_baud_rate(${BAUD_RATE_FALLBACK});
                  tf_uart->load_settings();
                  baud_rate_active->update();
                  disp1->send_command_printf("baud=%" PRIu32, static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
                }

            - delay: 500ms

      - lambda: |-
          if (system_flags.baud_fallback_active) {
            ESP_LOGW("${TAG_HW_UART}", "Baud upgrade: all %u retries exhausted - "
                                      "staying at fallback %" PRIu32 " bps for this session",
                                      static_cast<unsigned>(${BAUD_RATE_UPGRADE_RETRIES}),
                                      static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
            boot_log->execute("Baud", "Upgrade failed - staying at fallback");
          }

  - id: !extend boot_preparation
    then:
      - lambda: |-
          #if ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
            system_flags.baud_negotiation_enabled = true;
          #else
            system_flags.baud_negotiation_enabled = false;
          #endif  // ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
          ESP_LOGD("${TAG_HW_UART}", "Baud rate negotiation: %s", YESNO(system_flags.baud_negotiation_enabled));

  - id: !extend dump_config
    then:
      - lambda: |-
          ESP_LOGCONFIG("${TAG_HW_UART}", "UART:");
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Baud rate (active):   %" PRIu32 " bps",
                        tf_uart->get_baud_rate());
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Baud rate (compiled): %" PRIu32 " bps",
                        static_cast<uint32_t>(${BAUD_RATE}));
          #if ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
            ESP_LOGCONFIG("${TAG_HW_UART}", "  Baud rate (fallback): %" PRIu32 " bps",
                          static_cast<uint32_t>(${BAUD_RATE_FALLBACK}));
            if (system_flags.baud_fallback_active)
              ESP_LOGW("${TAG_HW_UART}", "  Mode: FALLBACK");
            else
              ESP_LOGCONFIG("${TAG_HW_UART}", "  Mode: primary rate");
          #endif  // ${BAUD_RATE} != ${BAUD_RATE_FALLBACK}
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Queue size: %d", tf_uart->available());

  - id: !extend stop_all
    then:
      - lambda: |-
          baud_negotiate->stop();
          baud_upgrade->stop();
          wait_for_uart_drain->stop();

  - id: wait_for_uart_drain
    mode: single
    then:
      - repeat:
          count: 60  # seconds
          then:
            - lambda: |-
                if (tf_uart->available() == 0) wait_for_uart_drain->stop();
                if (iteration % 5 == 0) boot_log->execute("Boot", "Waiting for UART empty queue");
            - delay: 1s

text_sensor:
  - id: baud_rate_active
    name: Baud rate
    platform: template
    icon: mdi:swap-horizontal
    entity_category: diagnostic
    lambda: |-
      return std::to_string(tf_uart->get_baud_rate());
    filters:
      - append: " bps"
    update_interval: 111min

uart:
  - id: tf_uart  # UART for Nextion display
    tx_pin: ${GPIO_DISPLAY_NEXTION_TX_PIN}
    rx_pin: ${GPIO_DISPLAY_NEXTION_RX_PIN}
    baud_rate: ${BAUD_RATE}
...
