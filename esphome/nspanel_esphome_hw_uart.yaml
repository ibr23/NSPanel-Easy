#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME HARDWARE - UART                                                                   #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  ##############################
  ## Change only in your      ##
  ## local yaml substitutions ##
  ##############################
  BAUD_RATE: "921600"                 # Target operating baud rate
  BAUD_RATE_PROBE_MS: 1500            # Per-rate probe window during baud scan (ms)
  BAUD_RATE_TIMEOUT: 11s              # Wait at primary rate before triggering baud scan
  BAUD_RATE_DELAY_AFTER_POWER_ON: 2s  # Delay after display power-on before probing
  GPIO_DISPLAY_NEXTION_RX_PIN: 17
  GPIO_DISPLAY_NEXTION_TX_PIN: 16
  TAG_HW_UART: nspanel.hw.uart

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_HW_UART

script:
  # ---------------------------------------------------------------------------
  # baud_scan
  #
  # Power-cycles the Nextion display and scans Nextion-supported baud rates
  # for a response. On success, switches the ESP UART to the discovered rate
  # and updates system_flags accordingly.
  #
  # Scan order: ${BAUD_RATE} is tried first (matches user's primary preference).
  # When ${BAUD_RATE} != 921600, 921600 is tried second since it is the most
  # common rate for new TFTs. The remaining rates follow Nextion-supported
  # rates ordered by likelihood of use in NSPanel Easy installs.
  #
  # On success: baud_scan_success = true, UART set to detected rate,
  #             baud_fallback_active set if detected rate != ${BAUD_RATE}.
  # On failure: baud_scan_success = false, UART restored to ${BAUD_RATE}.
  #
  # This script power-cycles the display itself; callers do not need to.
  # ---------------------------------------------------------------------------
  - id: baud_scan
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("${TAG_HW_UART}", "Baud scan: starting");
          boot_log->execute("Baud", "Scanning baud rates");

      # Power-cycle the display to ensure a clean UART state
      - switch.turn_off: screen_power
      - delay: 2s
      - switch.turn_on: screen_power
      - delay: ${BAUD_RATE_DELAY_AFTER_POWER_ON}

      - lambda: |-
          // Scan order: primary first, then 921600 (if not already primary),
          // then the rest of Nextion-supported rates ordered by likelihood.
          static const uint32_t BAUD_RATES[] = {
              ${BAUD_RATE},
              #if ${BAUD_RATE} != 921600
                921600,
              #endif  // ${BAUD_RATE} != 921600
              #if ${BAUD_RATE} != 115200
                115200,
              #endif  // ${BAUD_RATE} != 115200
              #if ${BAUD_RATE} != 9600
                9600,
              #endif  // ${BAUD_RATE} != 9600
              #if ${BAUD_RATE} != 230400
                230400,
              #endif  // ${BAUD_RATE} != 230400
              #if ${BAUD_RATE} != 57600
                57600,
              #endif  // ${BAUD_RATE} != 57600
              #if ${BAUD_RATE} != 38400
                38400,
              #endif  // ${BAUD_RATE} != 38400
              #if ${BAUD_RATE} != 256000
                256000,
              #endif  // ${BAUD_RATE} != 256000
              #if ${BAUD_RATE} != 512000
                512000,
              #endif  // ${BAUD_RATE} != 512000
              #if ${BAUD_RATE} != 250000
                250000,
              #endif  // ${BAUD_RATE} != 250000
              #if ${BAUD_RATE} != 19200
                19200,
              #endif  // ${BAUD_RATE} != 19200
              #if ${BAUD_RATE} != 31250
                31250,
              #endif  // ${BAUD_RATE} != 31250
              #if ${BAUD_RATE} != 4800
                4800,
              #endif  // ${BAUD_RATE} != 4800
              #if ${BAUD_RATE} != 2400
                2400,
              #endif  // ${BAUD_RATE} != 2400
          };
          static const size_t BAUD_RATE_COUNT = sizeof(BAUD_RATES) / sizeof(BAUD_RATES[0]);

          bool found = false;

          for (size_t i = 0; i < BAUD_RATE_COUNT && !found; ++i) {
            const uint32_t rate = BAUD_RATES[i];
            ESP_LOGI("${TAG_HW_UART}", "Baud scan: trying %" PRIu32 " bps", rate);

            // Switch ESP UART to candidate rate
            tf_uart->set_baud_rate(rate);
            tf_uart->load_settings();

            // Flush any RX noise
            uint32_t flush_until = millis() + 100;
            while (millis() < flush_until) {
              while (tf_uart->available()) {
                uint8_t discard;
                tf_uart->read_byte(&discard);
              }
              delay(1);
              App.feed_wdt();
            }

            // Exit reparse mode first - stock/legacy TFTs may be in reparse mode
            // where ASCII commands are silently discarded. The exit-reparse magic
            // sequence works regardless of the current mode.
            disp1->set_protocol_reparse_mode(false);  // Calls exit_reparse_mode_ internally; harmless if already out

            // Then send our probe directly via UART, bypassing the Nextion component
            // queue (which may drop commands while disconnected).
            const char probe_cmd[] = "get sleep\xFF\xFF\xFF";
            tf_uart->write_array(reinterpret_cast<const uint8_t *>(probe_cmd),
                                sizeof(probe_cmd) - 1);
            tf_uart->flush();
            ESP_LOGD("${TAG_HW_UART}", "Baud scan: probe sent (%zu bytes)",
                    sizeof(probe_cmd) - 1);

            // Spin waiting for response, log all bytes received
            const uint32_t probe_until = millis() + ${BAUD_RATE_PROBE_MS};
            bool got_response = false;
            uint8_t consecutive_ff = 0;
            uint32_t total_bytes = 0;
            char rx_log[96] = {0};
            size_t rx_log_idx = 0;
            while (millis() < probe_until) {
              while (tf_uart->available() > 0) {
                uint8_t b;
                tf_uart->read_byte(&b);
                ++total_bytes;
                if (rx_log_idx < sizeof(rx_log) - 4) {
                  rx_log_idx += snprintf(&rx_log[rx_log_idx],
                                        sizeof(rx_log) - rx_log_idx,
                                        "%02X ", b);
                }
                if (b == 0xFF) {
                  if (++consecutive_ff >= 3) {
                    got_response = true;
                    break;
                  }
                } else {
                  consecutive_ff = 0;
                }
              }
              if (got_response) break;
              delay(1);
              App.feed_wdt();
            }
            if (total_bytes > 0) {
              ESP_LOGI("${TAG_HW_UART}", "Baud scan: rx %" PRIu32 " bytes at %" PRIu32 " bps: %s",
                                          total_bytes, rate, rx_log);
            }

            // Flush probe response
            while (tf_uart->available()) {
              uint8_t discard;
              tf_uart->read_byte(&discard);
            }

            if (total_bytes > 0 && !got_response) {
              ESP_LOGD("${TAG_HW_UART}", "Baud scan: rx %" PRIu32 " bytes at %" PRIu32
                      " bps but no 0xFF terminator - likely framing garbage", total_bytes, rate);
            }

            if (got_response) {
              ESP_LOGI("${TAG_HW_UART}", "Baud scan: found active rate %" PRIu32 " bps", rate);
              found = true;
            } else {
              ESP_LOGD("${TAG_HW_UART}", "Baud scan: no response at %" PRIu32 " bps", rate);
              delay(50);
              App.feed_wdt();
            }
          }

          if (!found) {
            ESP_LOGE("${TAG_HW_UART}", "Baud scan: no response at any rate");
            // Restore compiled primary rate so the system is not left stranded
            tf_uart->set_baud_rate(${BAUD_RATE});
            tf_uart->load_settings();
          }

          // Persist scan outcome for callers
          system_flags.baud_scan_success = found;
          system_flags.baud_fallback_active = found && (tf_uart->get_baud_rate() != ${BAUD_RATE});
          system_flags.baud_rate_set = found;

          // Update baud rate sensor to reflect current UART state
          baud_rate_active->update();

          if (found) {
            boot_log->execute("Baud", "Scan complete - rate found");
          } else {
            boot_log->execute("Baud", "Scan complete - no rate found");
          }

  - id: !extend dump_config
    then:
      - lambda: |-
          ESP_LOGCONFIG("${TAG_HW_UART}", "UART:");
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Baud rate (active):   %" PRIu32 " bps",
                        tf_uart->get_baud_rate());
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Baud rate (compiled): %" PRIu32 " bps",
                        static_cast<uint32_t>(${BAUD_RATE}));
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Scan trigger:         ${BAUD_RATE_TIMEOUT}");
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Power-on delay:       ${BAUD_RATE_DELAY_AFTER_POWER_ON}");
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Probe window:         %u ms",
                        static_cast<unsigned>(${BAUD_RATE_PROBE_MS}));
          if (system_flags.baud_fallback_active) {
            ESP_LOGW("${TAG_HW_UART}", "  Mode: FALLBACK (detected via scan)");
          } else if (tf_uart->get_baud_rate() == static_cast<uint32_t>(${BAUD_RATE})) {
            ESP_LOGCONFIG("${TAG_HW_UART}", "  Mode: primary rate");
          } else {
            ESP_LOGW("${TAG_HW_UART}", "  Mode: non-primary rate (no scan run)");
          }
          ESP_LOGCONFIG("${TAG_HW_UART}", "  Queue size: %d", tf_uart->available());

  - id: !extend stop_all
    then:
      - lambda: |-
          baud_scan->stop();
          wait_for_uart_drain->stop();

  - id: wait_for_uart_drain
    mode: single
    then:
      - repeat:
          count: 60  # seconds
          then:
            - lambda: |-
                if (tf_uart->available() == 0) wait_for_uart_drain->stop();
                if (iteration % 5 == 0) boot_log->execute("Boot", "Waiting for UART empty queue");
            - delay: 1s

text_sensor:
  - id: baud_rate_active
    name: Baud rate
    platform: template
    icon: mdi:swap-horizontal
    entity_category: diagnostic
    lambda: |-
      return std::to_string(tf_uart->get_baud_rate());
    filters:
      - append: " bps"
    update_interval: 111min

uart:
  - id: tf_uart  # UART for Nextion display
    tx_pin: ${GPIO_DISPLAY_NEXTION_TX_PIN}
    rx_pin: ${GPIO_DISPLAY_NEXTION_RX_PIN}
    baud_rate: ${BAUD_RATE}
...
