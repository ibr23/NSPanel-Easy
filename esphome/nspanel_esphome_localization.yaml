  LANG_BYTES_PER_CHAR: "${LOCALIZATION[LANG].bytes_per_char}"
  LANG_ALARM_HOME: "${LOCALIZATION[LANG].alarm.home}"
  LANG_ALARM_AWAY: "${LOCALIZATION[LANG].alarm.away}"
  LANG_ALARM_NIGHT: "${LOCALIZATION[LANG].alarm.night}"
  LANG_ALARM_VACATION: "${LOCALIZATION[LANG].alarm.vacation}"
  LANG_ALARM_BYPASS: "${LOCALIZATION[LANG].alarm.bypass}"
  LANG_ALARM_DISARM: "${LOCALIZATION[LANG].alarm.disarm}"
  SENTINEL_NO_NAME: "__no_name__"
  SENTINEL_UNAVAILABLE: "_{_unavailable_}_"
  SENTINEL_UNKNOWN: "_{_unknown_}_"

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_LOCALIZATION

script:
  - id: !extend dump_config
    then:
      - lambda: >-
          ESP_LOGCONFIG("${TAG_LOCALIZATION}", "Localization:");
          ESP_LOGCONFIG("${TAG_LOCALIZATION}", "  Language: '${ language }'");
          if (${ 1 if LANGUAGE_LOWER in SUPPORTED_LANGUAGES else 0 }) {
            ESP_LOGCONFIG("${TAG_LOCALIZATION}", "  Valid: Yes");
          } else {
            ESP_LOGE("${TAG_LOCALIZATION}", "  Fallback to English");
          }
...
